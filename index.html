// =============================================
// shared-client.js (gwangsu-shared-lib v1) — 인라인 포함
// =============================================
function callApi(action, params, opts) {
  params = params || {};
  opts = opts || {};
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      const runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      const mapper = opts.actionMap && opts.actionMap[action];
      if (mapper) { mapper(runner, params); }
      else { reject(new Error(`callApi: action "${action}"에 대한 actionMap 항목이 없습니다.`)); }
      return;
    }
    if (opts.jsonp) {
      const url = new URL(opts.scriptUrl);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      jsonp(url.toString()).then(resolve).catch(reject);
      return;
    }
    const url = new URL(opts.scriptUrl);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    fetch(url.toString())
      .then(r => r.json())
      .then(data => { if (data && data.error) reject(new Error(data.error)); else resolve(data); })
      .catch(reject);
  });
}
function jsonpOnce(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + Date.now() + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    const timeoutId = setTimeout(() => { delete window[cbName]; script.remove(); reject(new Error('서버 응답 시간이 초과되었습니다.')); }, 6000);
    window[cbName] = (data) => { clearTimeout(timeoutId); delete window[cbName]; script.remove(); resolve(data); };
    script.onerror = () => { clearTimeout(timeoutId); delete window[cbName]; script.remove(); reject(new Error('서버에 연결할 수 없습니다.')); };
    document.head.appendChild(script);
  });
}
function jsonp(url) {
  return jsonpOnce(url).catch(() => new Promise((resolve, reject) => {
    setTimeout(() => { jsonpOnce(url).then(resolve).catch(reject); }, 1500);
  }));
}
function detectInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
}
function openInExternalBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua)) window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  else if (/NAVER/i.test(ua)) window.location.href = 'naversearchapp://inappbrowser?app=naversearchapp&url=' + encodeURIComponent(url);
  else window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}
function showExternalBrowserBannerIfNeeded(bannerId) {
  if (detectInAppBrowser()) { const el = document.getElementById(bannerId); if (el) el.style.display = 'block'; }
}
function cachedFetchJSON(key, fetchFn, ttlMs) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) { const { ts, data } = JSON.parse(raw); if (Date.now() - ts < ttlMs) return Promise.resolve(data); }
  } catch (e) {}
  return fetchFn().then(data => {
    try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch (e) {}
    return data;
  });
}
function fuzzySearch(items, query, fields) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return items;
  const qNorm = q.replace(/\s/g, '');
  return items.filter(item => fields.some(f => {
    const v = String(item[f] || '').toLowerCase();
    return v.includes(q) || v.replace(/\s/g, '').includes(qNorm);
  }));
}

  { title: '교직원 IP 조회', category: '정보기기', url: 'ip.html', keywords: 'ip 아이피 구글계정 교직원 컴퓨터 네트워크', description: '이름 검색으로 구글계정·IP 주소 확인 (연도별)', thumb: T.ip },
];

let allItems = [];
let activeCategory = '교사메뉴';

function loadIndex() {
  return cachedFetchJSON('gwangsu_index_v1', () =>
    callApi('getIndex', {}, { scriptUrl: APPS_SCRIPT_URL, actionMap: ACTION_MAP }), 5 * 60 * 1000);
}

function renderChips(items) {
  const categories = [...new Set(items.map(i => i.category).filter(Boolean))];
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeCategory === '' ? ' active' : '');
  allChip.textContent = '전체';
  allChip.onclick = () => { activeCategory = ''; renderChips(items); renderResults(); };
  chipsEl.appendChild(allChip);
  categories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeCategory === cat ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => { activeCategory = cat; renderChips(items); renderResults(); };
    chipsEl.appendChild(chip);
  });
}

function renderResults() {
  const q = document.getElementById('searchBox').value;
  let results = activeCategory ? allItems.filter(i => i.category === activeCategory) : allItems;
  results = fuzzySearch(results, q, ['title', 'keywords', 'description']);

  const grid = document.getElementById('cardGrid');
  if (!results.length) {
    grid.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }
  grid.innerHTML = results.map(item => `
    <a class="card" href="${esc(item.url)}" target="_blank" rel="noopener">
      <div class="card-thumb">${item.thumb || autoThumb(item)}</div>
      <div class="card-head">${iconFor(item.url)}<div class="cat">${esc(item.category)}</div></div>
      <div class="title">${esc(item.title)}</div>
      <div class="desc">${esc(item.description)}</div>
    </a>
  `).join('');
}

// 시트에서 온 항목(thumb 없음)에 제목 키워드·URL 타입 기반으로 자동 썸네일 생성
function autoThumb(item) {
  const u = String(item.url || '');
  const cat = String(item.category || '');
  const title = String(item.title || '');
  const tl = title.toLowerCase();

  // ── 제목 키워드 매칭 — T 객체 SVG 재사용 ──────────────
  if (tl.includes('내선번호') || tl.includes('내선')) return T.phone;
  if (tl.includes('업무분장')) return T.duties;
  if (tl.includes('구글계정') && tl.includes('교직원')) return T.gaccount;
  if (tl.includes('계정 모음') || tl.includes('계정모음') || (tl.includes('계정') && tl.includes('학교') && !tl.includes('구글'))) return T.accounts;
  if (tl.includes('출입문')) return T.door;
  if (tl.includes('규정집') || tl.includes('제규정')) return T.rules;
  if (tl.includes('유지보수') || (tl.includes('관리대장') && cat === '정보기기')) return T.maintenance;
  if (tl.includes('크롬북') && tl.includes('보관함')) return T.locker;
  if (tl.includes('크롬북')) return T.chromebook;
  if ((tl.includes('ip') || tl.includes('아이피')) && tl.includes('설정')) return T.slides_ip;
  if (tl.includes('프린트') || tl.includes('프린터') || tl.includes('드라이버')) return T.slides_print;
  if (tl.includes('와이파이') || tl.includes('wifi') || tl.includes('무선망')) return T.wifi;
  if (tl.includes('ip') && tl.includes('조회')) return T.ip;

  // ── 카테고리별 커스텀 SVG ────────────────────────────

  // 학사일정 캘린더
  if (tl.includes('캘린더') || tl.includes('calendar')) return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="var(--accent-soft)"/><rect x="50" y="8" width="180" height="80" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/><rect x="50" y="8" width="180" height="22" rx="8" fill="var(--accent)" opacity="0.85"/><rect x="50" y="22" width="180" height="8" fill="var(--accent)" opacity="0.85"/><text x="140" y="22" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700" font-family="sans-serif">📅 학사일정 캘린더</text><rect x="58" y="34" width="24" height="5" rx="1" fill="var(--text-muted)" opacity="0.3"/><rect x="86" y="34" width="24" height="5" rx="1" fill="var(--text-muted)" opacity="0.3"/><rect x="114" y="34" width="24" height="5" rx="1" fill="var(--text-muted)" opacity="0.3"/><rect x="142" y="34" width="24" height="5" rx="1" fill="var(--text-muted)" opacity="0.3"/><rect x="170" y="34" width="24" height="5" rx="1" fill="var(--text-muted)" opacity="0.3"/><rect x="198" y="34" width="24" height="5" rx="1" fill="var(--text-muted)" opacity="0.3"/>${[...Array(4)].map((_,ri)=>[...Array(6)].map((__,ci)=>{const hi=(ri===0&&ci===2)||(ri===1&&ci===4)||(ri===2&&ci===0)||(ri===3&&ci===3);return `<rect x="${58+ci*28}" y="${44+ri*11}" width="24" height="8" rx="2" fill="${hi?'var(--accent)':'var(--accent-soft)'}" opacity="${hi?'0.9':'0.5'}"/>`}).join('')).join('')}<text x="140" y="96" text-anchor="middle" font-size="7" fill="var(--text-muted)" font-family="sans-serif">실시간 갱신 · 달력형</text></svg>`;

  // 학사일정 (목록형)
  if (tl.includes('학사일정') || cat === '학사일정') return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="var(--accent-soft)"/><rect x="40" y="8" width="160" height="80" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/><rect x="40" y="8" width="160" height="18" rx="6" fill="var(--accent)" opacity="0.8"/><rect x="40" y="18" width="160" height="8" fill="var(--accent)" opacity="0.8"/><text x="120" y="21" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700" font-family="sans-serif">2026 학사일정</text>${[['3월','입학식·개학'],['4월','중간고사'],['6월','기말고사'],['7월','방학']].map(([m,e],i)=>`<text x="50" y="${33+i*14}" font-size="7.5" fill="var(--accent)" font-weight="700" font-family="sans-serif">${m}</text><text x="74" y="${33+i*14}" font-size="7.5" fill="var(--text-muted)" font-family="sans-serif">${e}</text>`).join('')}<text x="225" y="62" text-anchor="middle" font-size="42" font-family="sans-serif">📅</text></svg>`;

  // 학생 정보 조회(시트)
  if (tl.includes('학생') && (tl.includes('조회') || tl.includes('정보') || tl.includes('시트'))) return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="#e8f5e9"/><rect x="28" y="8" width="224" height="80" rx="6" fill="var(--surface)" stroke="#0f9d58" stroke-width="1.5"/><rect x="28" y="8" width="224" height="18" rx="6" fill="#0f9d58" opacity="0.8"/><rect x="28" y="18" width="224" height="8" fill="#0f9d58" opacity="0.8"/><text x="140" y="21" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="sans-serif">학생 정보 조회 (시트)</text>${[...Array(5)].map((_,i)=>`<rect x="36" y="${32+i*11}" width="208" height="9" rx="2" fill="${i===0?'#c8e6c9':i%2===0?'#e8f5e9':'#fff'}"/>${i===0?`<rect x="38" y="33" width="30" height="7" rx="1" fill="#0f9d58" opacity="0.5"/><rect x="74" y="33" width="55" height="7" rx="1" fill="#0f9d58" opacity="0.4"/><rect x="135" y="33" width="45" height="7" rx="1" fill="#0f9d58" opacity="0.3"/><rect x="186" y="33" width="50" height="7" rx="1" fill="#0f9d58" opacity="0.3"/>`:''}`).join('')}</svg>`;

  // 교육과정재구성 / 교육활동 (슬라이드 느낌)
  if (tl.includes('교육과정') || tl.includes('교육활동')) return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="#fff8e1"/><rect x="35" y="10" width="210" height="72" rx="6" fill="#fff" stroke="#f9ab00" stroke-width="1.5"/><rect x="35" y="10" width="210" height="20" rx="6" fill="#f9ab00" opacity="0.9"/><rect x="35" y="22" width="210" height="8" fill="#f9ab00" opacity="0.9"/><text x="140" y="24" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="sans-serif">${esc(title.slice(0,16))}</text>${[['교육과정 재구성','문서'],['교수·학습 계획','수립'],['평가 계획','연계']].map(([a,b],i)=>`<rect x="45" y="${37+i*15}" width="190" height="12" rx="3" fill="#fff8e1"/><text x="52" y="${47+i*15}" font-size="8" fill="#b8860b" font-family="sans-serif">· ${a}</text><text x="190" y="${47+i*15}" font-size="7" fill="#f9ab00" font-family="sans-serif">${b}</text>`).join('')}</svg>`;

  // ── URL 타입 폴백 ────────────────────────────────────
  if (u.includes('docs.google.com/presentation')) {
    const words = title.replace(/[()]/g, '').split(/\s+/).slice(0, 4);
    const line1 = words.slice(0, 2).join(' '), line2 = words.slice(2).join(' ');
    return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="#fff8ee"/><rect x="50" y="12" width="180" height="76" rx="6" fill="#fff" stroke="#f9ab00" stroke-width="1.5"/><rect x="50" y="12" width="180" height="24" rx="6" fill="#f9ab00"/><rect x="50" y="28" width="180" height="8" fill="#f9ab00"/><text x="140" y="27" text-anchor="middle" font-size="9" fill="#fff" font-weight="700" font-family="sans-serif">${esc(line1)}</text>${line2?`<text x="140" y="38" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif">${esc(line2)}</text>`:''}${[0,1,2].map(i=>`<rect x="62" y="${48+i*12}" width="${80+i*20}" height="5" rx="2" fill="#f9ab00" opacity="${0.25-i*0.05}"/>`).join('')}<text x="200" y="75" text-anchor="middle" font-size="28" font-family="sans-serif">📊</text></svg>`;
  }
  if (u.includes('docs.google.com/spreadsheets')) {
    const words = title.split(/\s+/).slice(0, 3).join(' ');
    return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="#f0faf4"/><rect x="50" y="12" width="180" height="76" rx="6" fill="#fff" stroke="#0f9d58" stroke-width="1.5"/><rect x="50" y="12" width="180" height="20" rx="6" fill="#0f9d58"/><rect x="50" y="24" width="180" height="8" fill="#0f9d58"/><text x="140" y="25" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700" font-family="sans-serif">${esc(words)}</text>${[0,1,2,3].map(i=>`<rect x="56" y="${36+i*13}" width="168" height="11" rx="1" fill="${i%2===0?'#f0faf4':'#fff'}"/><rect x="58" y="${38+i*13}" width="30" height="7" rx="1" fill="#0f9d58" opacity="0.3"/><rect x="94" y="${38+i*13}" width="70" height="7" rx="1" fill="#0f9d58" opacity="0.15"/>`).join('')}</svg>`;
  }
  if (u.includes('docs.google.com/document')) {
    const words = title.split(/\s+/).slice(0, 3).join(' ');
    return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="#eef3ff"/><rect x="80" y="10" width="120" height="80" rx="5" fill="#fff" stroke="#4285f4" stroke-width="1.5"/><rect x="80" y="10" width="120" height="20" rx="5" fill="#4285f4" opacity="0.8"/><rect x="80" y="22" width="120" height="8" fill="#4285f4" opacity="0.8"/><text x="140" y="24" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="sans-serif">${esc(words)}</text>${[0,1,2,3,4].map(i=>`<rect x="90" y="${36+i*10}" width="${60+Math.abs(2-i)*12}" height="4" rx="1" fill="#4285f4" opacity="0.2"/>`).join('')}</svg>`;
  }
  if (u.includes('drive.google.com')) {
    return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="var(--accent-soft)"/><text x="140" y="54" text-anchor="middle" font-size="44" font-family="sans-serif">📄</text><text x="140" y="78" text-anchor="middle" font-size="8.5" fill="var(--text-muted)" font-family="sans-serif">${esc(title.slice(0,20))}</text></svg>`;
  }
  // 기본 — 카테고리 이모지 + 제목
  const catEmoji = {'학사일정':'📅','교육과정재구성':'📚','학생정보':'🎓','정보기기':'💻','교사메뉴':'📋'}[cat] || '📌';
  return `<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="100" fill="var(--accent-soft)"/><text x="140" y="52" text-anchor="middle" font-size="40" font-family="sans-serif">${catEmoji}</text><text x="140" y="76" text-anchor="middle" font-size="9" fill="var(--text-muted)" font-family="sans-serif">${esc(title.slice(0,20))}</text></svg>`;

// 링크 종류에 따라 카드에 보여줄 작은 아이콘 — 구글 슬라이드/시트는 간단한 색상 아이콘으로,
// 우리가 만든 자체 HTML 페이지(GitHub Pages)는 광수 로고로, 그 외는 기본 문서 아이콘으로 표시한다.
function iconFor(url) {
  const u = String(url || '');
  if (u.includes('docs.google.com/presentation')) {
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#f9ab00"/><rect x="5" y="6" width="14" height="9" rx="1" fill="#fff"/><rect x="9" y="17" width="6" height="2" rx="1" fill="#fff"/></svg>';
  }
  if (u.includes('docs.google.com/spreadsheets')) {
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#0f9d58"/><rect x="5" y="5" width="14" height="14" rx="1" fill="#fff"/><rect x="5" y="9.3" width="14" height="1.4" fill="#0f9d58"/><rect x="5" y="13.3" width="14" height="1.4" fill="#0f9d58"/><rect x="10.3" y="5" width="1.4" height="14" fill="#0f9d58"/></svg>';
  }
  if (u.includes('ddelza.github.io/gwangsu-on')) {
    return '<img class="card-icon" src="logo.png" alt="">';
  }
  return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#90a4ae"/><rect x="6" y="5" width="12" height="14" rx="1" fill="#fff"/></svg>';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let debounceTimer = null;
document.getElementById('searchBox').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderResults, 150);
});

window.onload = function() {
  showExternalBrowserBannerIfNeeded('inappBanner');
  loadIndex().then(data => {
    allItems = [...LOCAL_ITEMS, ...(data.items || [])];
    renderChips(allItems);
    renderResults();
  }).catch(err => {
    // 시트 로드 실패해도 로컬 항목은 보여줌
    allItems = [...LOCAL_ITEMS];
    renderChips(allItems);
    renderResults();
  });
};
