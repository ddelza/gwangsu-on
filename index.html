<!DOCTYPE html>
<html lang="ko">
<head>
<script>(function(){try{var t=localStorage.getItem('gwangsu_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광수 Online 교무실</title>
<!-- style.css 내용을 그대로 인라인 — Apps Script HtmlService(createHtmlOutputFromFile)는
     템플릿 스크립틀릿을 평가하지 않고, GitHub Pages 정적 호스팅에서도 상대경로 include가
     보장되지 않아 두 환경 모두에서 동일하게 동작하도록 직접 삽입한다. style.css 수정 시 같이 갱신할 것. -->
<style>
* { box-sizing: border-box; }

:root {
  --bg: #f5f5f7; --surface: #ffffff; --text: #1d1d1f; --text-muted: #6e6e73;
  --border: rgba(0,0,0,0.08); --nav-bg: #000000; --nav-text: rgba(255,255,255,0.85); --accent: #0066cc; --accent-soft: rgba(0,102,204,0.08);
}
:root[data-theme="teal"] { --bg:#f0f7f6; --surface:#ffffff; --text:#1d1d1f; --text-muted:#4a7a74; --border:rgba(0,0,0,0.08); --nav-bg:#00695c; --nav-text:rgba(255,255,255,0.9); --accent:#00695c; --accent-soft:rgba(0,105,92,0.08); }
:root[data-theme="coral"] { --bg:#fdf5f3; --surface:#ffffff; --text:#1d1d1f; --text-muted:#9a5a4a; --border:rgba(0,0,0,0.08); --nav-bg:#c0392b; --nav-text:rgba(255,255,255,0.9); --accent:#c0392b; --accent-soft:rgba(192,57,43,0.08); }
:root[data-theme="lavender"] { --bg:#f5f4fb; --surface:#ffffff; --text:#1d1d1f; --text-muted:#6a5a9a; --border:rgba(0,0,0,0.08); --nav-bg:#5b47b0; --nav-text:rgba(255,255,255,0.9); --accent:#5b47b0; --accent-soft:rgba(91,71,176,0.08); }
:root[data-theme="forest"] { --bg:#f2f7f2; --surface:#ffffff; --text:#1d1d1f; --text-muted:#4a7a5a; --border:rgba(0,0,0,0.08); --nav-bg:#2d6a3f; --nav-text:rgba(255,255,255,0.9); --accent:#2d6a3f; --accent-soft:rgba(45,106,63,0.08); }
:root[data-theme="slate"] { --bg:#f4f4f6; --surface:#ffffff; --text:#1d1d1f; --text-muted:#5a6070; --border:rgba(0,0,0,0.08); --nav-bg:#3a4252; --nav-text:rgba(255,255,255,0.9); --accent:#3a4252; --accent-soft:rgba(58,66,82,0.08); }
:root[data-theme="dark-navy"] { --bg:#1c2029; --surface:#232a38; --text:#e8eaed; --text-muted:#8a96aa; --border:rgba(255,255,255,0.08); --nav-bg:#0d1117; --nav-text:rgba(255,255,255,0.85); --accent:#4d9cff; --accent-soft:rgba(77,156,255,0.12); }
:root[data-theme="dark-forest"] { --bg:#1a2220; --surface:#222e2a; --text:#e4ece6; --text-muted:#7a9a84; --border:rgba(255,255,255,0.08); --nav-bg:#0f1a14; --nav-text:rgba(255,255,255,0.85); --accent:#4caf78; --accent-soft:rgba(76,175,120,0.12); }
:root[data-theme="dark-plum"] { --bg:#1e1a26; --surface:#26212e; --text:#ece8f0; --text-muted:#9a88b0; --border:rgba(255,255,255,0.08); --nav-bg:#130f1a; --nav-text:rgba(255,255,255,0.85); --accent:#b07ee0; --accent-soft:rgba(176,126,224,0.12); }

body {
  margin: 0;
  font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px; line-height: 1.47; letter-spacing: -0.374px;
  -webkit-font-smoothing: antialiased;
}
.topnav {
  display: flex; align-items: center; gap: 0;
  background: var(--nav-bg); padding: 0 22px; height: 44px;
  position: sticky; top: 0; z-index: 100;
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
}
.topnav .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--nav-text); font-weight: 600; font-size: 15px; letter-spacing: -0.3px; margin-right: 8px; white-space: nowrap; text-decoration: none; opacity: 1; }
.brand-logo { height: 22px; width: auto; display: block; }
.gen1-link { margin-left: auto; }
.topnav a { color: var(--nav-text); text-decoration: none; padding: 0 10px; font-size: 12px; font-weight: 400; letter-spacing: -0.12px; line-height: 44px; opacity: 0.85; white-space: nowrap; border-radius: 0; }
.topnav a:hover { opacity: 1; background: none; color: var(--nav-text); }
.topnav a.active { opacity: 1; background: none; color: var(--nav-text); font-weight: 600; }
#inappBanner {
  display: none; background: #fff3e0; border: 2px solid #ffb74d; border-radius: 12px;
  padding: 16px 20px; margin: 16px; text-align: center;
}
#inappBanner p { font-size: 0.9rem; color: #e65100; margin-bottom: 10px; line-height: 1.5; }
#inappBanner button {
  padding: 9px 18px; background: #e65100; color: white; border: none;
  border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600;
}
.search-wrap { padding: 20px 16px 8px; max-width: 960px; margin: 0 auto; }
.search-box { width: 100%; padding: 14px 16px; font-size: 1.05rem; border: 1.5px solid var(--border); border-radius: 9999px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.chip { padding: 6px 14px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 0.85rem; cursor: pointer; border: none; }
.chip.active { background: var(--accent); color: #fff; }
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px;
  max-width: 960px; margin: 0 auto; padding: 8px 16px 40px;
}
.card {
  display: block; background: var(--surface); border-radius: 18px; padding: 16px; text-decoration: none;
  color: var(--text); border: 1px solid var(--border); transition: background 0.15s;
}
.card:hover { background: var(--bg); }
.card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.card-icon { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; object-fit: contain; }
.card .cat { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
.card .title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
.card .desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }
.empty-state { text-align: center; color: var(--text-muted); padding: 40px 0; }
@media (max-width: 600px) {
  .topnav { padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .topnav::-webkit-scrollbar { display: none; }
  .search-box { font-size: 1rem; }
  .card-grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 10px 30px; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="brand"><img src="logo.png" alt="" class="brand-logo">광수 Online 교무실 2세대</a>
  <a href="calender.html">캘린더</a>
  <a href="stu.html">학생 정보 조회</a>
  <a href="phone.html">내선번호</a>
  <a href="tools.html">행정업무 간소화 도구</a>
  <a href="https://sites.google.com/kwangsu.ms.kr/work" target="_blank" rel="noopener" class="gen1-link">1세대 바로가기 ↗</a>
</nav>

<div id="inappBanner">
  <p>⚠️ 카카오톡 등 메신저 안에서 열면 데이터를 불러오지 못할 수 있어요.<br>아래 버튼으로 외부 브라우저(Chrome/Safari)에서 열어주세요.</p>
  <button onclick="openInExternalBrowser()">외부 브라우저로 열기</button>
</div>

<div class="search-wrap">
  <input id="searchBox" class="search-box" type="text" placeholder="찾는 자료나 페이지 이름을 입력하세요 (예: 학사일정, 내선번호, 동아리)">
  <div id="chips" class="chips"></div>
</div>

<div id="cardGrid" class="card-grid">
  <div class="empty-state">불러오는 중...</div>
</div>

<script>
// =============================================
// shared-client.js (gwangsu-shared-lib v1) — 인라인 포함
// =============================================
function callApi(action, params, opts) {
  params = params || {};
  opts = opts || {};
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      const runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      const mapper = opts.actionMap && opts.actionMap[action];
      if (mapper) { mapper(runner, params); }
      else { reject(new Error(`callApi: action "${action}"에 대한 actionMap 항목이 없습니다.`)); }
      return;
    }
    if (opts.jsonp) {
      const url = new URL(opts.scriptUrl);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      jsonp(url.toString()).then(resolve).catch(reject);
      return;
    }
    const url = new URL(opts.scriptUrl);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    fetch(url.toString())
      .then(r => r.json())
      .then(data => { if (data && data.error) reject(new Error(data.error)); else resolve(data); })
      .catch(reject);
  });
}
function jsonpOnce(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + Date.now() + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    const timeoutId = setTimeout(() => { delete window[cbName]; script.remove(); reject(new Error('서버 응답 시간이 초과되었습니다.')); }, 6000);
    window[cbName] = (data) => { clearTimeout(timeoutId); delete window[cbName]; script.remove(); resolve(data); };
    script.onerror = () => { clearTimeout(timeoutId); delete window[cbName]; script.remove(); reject(new Error('서버에 연결할 수 없습니다.')); };
    document.head.appendChild(script);
  });
}
function jsonp(url) {
  return jsonpOnce(url).catch(() => new Promise((resolve, reject) => {
    setTimeout(() => { jsonpOnce(url).then(resolve).catch(reject); }, 1500);
  }));
}
function detectInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
}
function openInExternalBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua)) window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  else if (/NAVER/i.test(ua)) window.location.href = 'naversearchapp://inappbrowser?app=naversearchapp&url=' + encodeURIComponent(url);
  else window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}
function showExternalBrowserBannerIfNeeded(bannerId) {
  if (detectInAppBrowser()) { const el = document.getElementById(bannerId); if (el) el.style.display = 'block'; }
}
function cachedFetchJSON(key, fetchFn, ttlMs) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) { const { ts, data } = JSON.parse(raw); if (Date.now() - ts < ttlMs) return Promise.resolve(data); }
  } catch (e) {}
  return fetchFn().then(data => {
    try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch (e) {}
    return data;
  });
}
function fuzzySearch(items, query, fields) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return items;
  const qNorm = q.replace(/\s/g, '');
  return items.filter(item => fields.some(f => {
    const v = String(item[f] || '').toLowerCase();
    return v.includes(q) || v.replace(/\s/g, '').includes(qNorm);
  }));
}

// =============================================
// 페이지 로직
// =============================================
// GitHub Pages에서 호출할 때 사용할 배포 URL — 실제 배포 후 채워 넣기
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqEOYSrqY8FxiNc88lCml7Ym1w1imonHjgO4qqo0fzIB_8rdXs-PVoIMdBQA8t8L75wg/exec';
const ACTION_MAP = {
  getIndex: (runner) => runner.getIndex(),
};

let allItems = [];
let activeCategory = '';

function loadIndex() {
  return cachedFetchJSON('gwangsu_index_v1', () =>
    callApi('getIndex', {}, { scriptUrl: APPS_SCRIPT_URL, actionMap: ACTION_MAP }), 5 * 60 * 1000);
}

function renderChips(items) {
  const categories = [...new Set(items.map(i => i.category).filter(Boolean))];
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeCategory === '' ? ' active' : '');
  allChip.textContent = '전체';
  allChip.onclick = () => { activeCategory = ''; renderChips(items); renderResults(); };
  chipsEl.appendChild(allChip);
  categories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeCategory === cat ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => { activeCategory = cat; renderChips(items); renderResults(); };
    chipsEl.appendChild(chip);
  });
}

function renderResults() {
  const q = document.getElementById('searchBox').value;
  let results = activeCategory ? allItems.filter(i => i.category === activeCategory) : allItems;
  results = fuzzySearch(results, q, ['title', 'keywords', 'description']);

  const grid = document.getElementById('cardGrid');
  if (!results.length) {
    grid.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }
  grid.innerHTML = results.map(item => `
    <a class="card" href="${esc(item.url)}" target="_blank" rel="noopener">
      <div class="card-head">${iconFor(item.url)}<div class="cat">${esc(item.category)}</div></div>
      <div class="title">${esc(item.title)}</div>
      <div class="desc">${esc(item.description)}</div>
    </a>
  `).join('');
}

// 링크 종류에 따라 카드에 보여줄 작은 아이콘 — 구글 슬라이드/시트는 간단한 색상 아이콘으로,
// 우리가 만든 자체 HTML 페이지(GitHub Pages)는 광수 로고로, 그 외는 기본 문서 아이콘으로 표시한다.
function iconFor(url) {
  const u = String(url || '');
  if (u.includes('docs.google.com/presentation')) {
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#f9ab00"/><rect x="5" y="6" width="14" height="9" rx="1" fill="#fff"/><rect x="9" y="17" width="6" height="2" rx="1" fill="#fff"/></svg>';
  }
  if (u.includes('docs.google.com/spreadsheets')) {
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#0f9d58"/><rect x="5" y="5" width="14" height="14" rx="1" fill="#fff"/><rect x="5" y="9.3" width="14" height="1.4" fill="#0f9d58"/><rect x="5" y="13.3" width="14" height="1.4" fill="#0f9d58"/><rect x="10.3" y="5" width="1.4" height="14" fill="#0f9d58"/></svg>';
  }
  if (u.includes('ddelza.github.io/gwangsu-on')) {
    return '<img class="card-icon" src="logo.png" alt="">';
  }
  return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#90a4ae"/><rect x="6" y="5" width="12" height="14" rx="1" fill="#fff"/></svg>';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let debounceTimer = null;
document.getElementById('searchBox').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderResults, 150);
});

window.onload = function() {
  showExternalBrowserBannerIfNeeded('inappBanner');
  loadIndex().then(data => {
    allItems = data.items || [];
    renderChips(allItems);
    renderResults();
  }).catch(err => {
    document.getElementById('cardGrid').innerHTML =
      `<div class="empty-state">불러오기 실패: ${esc(err.message || String(err))}</div>`;
  });
};
</script>
</body>
</html>
