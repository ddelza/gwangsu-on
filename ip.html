<script>
(function(){
  var F={
    'claude':'Nanum+Myeongjo','notion':'Noto+Sans+KR:wght@400;600;700',
    'figma':'IBM+Plex+Sans+KR:wght@400;500','starbucks':'Gowun+Dodum',

    if(F[t]){
      var p=document.createElement('link');p.rel='preconnect';p.href='https://fonts.googleapis.com';document.head.appendChild(p);

body { margin:0; font-family:var(--font-body,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif); background:var(--bg); color:var(--text); }

.topnav { display:flex; flex-wrap:wrap; align-items:center; gap:4px; background:var(--nav-bg); padding:12px 16px; }
.topnav .brand { color:#fff; font-weight:700; font-size:1.05rem; margin-right:16px; white-space:nowrap; display:inline-flex; align-items:center; gap:8px; }
.brand-logo { height:28px; width:auto; display:block; }
.gen1-link { margin-left:auto; font-size:0.8rem; opacity:0.85; }
.topnav a { color:var(--nav-text); text-decoration:none; padding:8px 12px; border-radius:8px; font-size:0.92rem; }
.topnav a:hover { background:rgba(255,255,255,0.15); color:#fff; }

.content { max-width: 800px; margin: 0 auto; padding: 24px 16px 48px; }

.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 4px; color: var(--accent); }
.page-header p { font-size: 0.88rem; color: var(--text-muted); margin: 0; }

/* 안내 버튼 2개 */
.guide-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.guide-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
  text-decoration: none; color: var(--on-accent, #fff); background: var(--accent);
  border: none; cursor: pointer; transition: opacity 0.15s;
}
.guide-btn:hover { opacity: 0.85; }
.guide-btn.secondary {
  background: var(--accent-soft); color: var(--accent);
  border: 1.5px solid var(--border);
}

/* 검색창 */
.search-box {
  width: 100%; padding: 13px 16px; font-size: 1rem;
  border: 2px solid var(--border); border-radius: 12px; outline: none;
  background: var(--surface); color: var(--text); margin-bottom: 16px;
}
.search-box:focus { border-color: var(--accent); }

/* 결과 */
.result-area { display: flex; flex-direction: column; gap: 12px; }

.result-card {
  background: var(--surface); border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden;
}
.result-year {
  background: var(--accent); color: var(--on-accent, #fff);
  font-size: 0.82rem; font-weight: 700; padding: 6px 14px;
  letter-spacing: 0.05em;
}
.result-rows { padding: 0; }

.info-row {
  display: grid; grid-template-columns: 80px 1fr;
  border-bottom: 1px solid var(--border); align-items: center;
}
.info-row:last-child { border-bottom: none; }
.info-label {
  padding: 10px 14px; font-size: 0.8rem; color: var(--text-muted);
  font-weight: 600; background: var(--accent-soft); white-space: nowrap;
}
.info-value {
  padding: 10px 14px; font-size: 0.92rem; font-family: "Consolas","Menlo",monospace;
  word-break: break-all;
}
.info-value.name-val { font-family: inherit; font-weight: 700; font-size: 1rem; }
.info-value.empty { color: var(--text-muted); font-style: italic; font-family: inherit; }

.empty-state { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: 0.95rem; }

.multi-result { display: flex; flex-direction: column; gap: 12px; }

  .topnav { padding: 10px 12px; }

<body>

<nav class="topnav">
  <a href="settings.html" class="brand-logo-link"><img src="logo.png" alt="" class="brand-logo"></a>
  <a href="./" class="brand">광수 Online 교무실 2세대</a>
  <a href="calender.html">캘린더</a>
  <a href="stu.html">학생 정보 조회</a>
  <a href="phone.html">내선번호</a>
  <a href="tools.html">행정업무 간소화 도구</a>
  <a href="https://sites.google.com/kwangsu.ms.kr/work" target="_blank" rel="noopener" class="gen1-link">1세대 바로가기 ↗</a>
</nav>

<div class="content">
  <div class="page-header">
    <h1>🖥️ 교직원 IP 조회</h1>
    <p>이름을 검색하면 구글계정과 IP 정보를 확인할 수 있습니다.</p>
  </div>

  <div class="guide-btns">
    <a class="guide-btn"
       href="https://docs.google.com/presentation/d/1fAdUGrzsISxmSEhZjizRciNChZ7MzlLQztkWcPSVuJQ/edit?slide=id.p#slide=id.p"
       target="_blank" rel="noopener">
      📡 학교 IP 설정 방법
    </a>
    <a class="guide-btn secondary"
       href="https://docs.google.com/presentation/d/10p6XMos1vCUJ8v2u5chg0xst6NiyySmx6-fmBa7qy3Y/edit#slide=id.p"
       target="_blank" rel="noopener">
      🖨️ 프린트 드라이버 설정 방법
    </a>
  </div>

  <input id="searchBox" class="search-box" type="text" placeholder="이름을 입력하세요 (예: 홍길동)">

  <div id="resultArea" class="result-area">
    <div class="hint">이름을 입력하면 해당 교직원의 IP 정보가 표시됩니다.</div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqEOYSrqY8FxiNc88lCml7Ym1w1imonHjgO4qqo0fzIB_8rdXs-PVoIMdBQA8t8L75wg/exec';

let yearData = null; // { '2025': { entries, labels }, '2026': { entries, labels }, ... }

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadData() {
  const url = new URL(APPS_SCRIPT_URL);
  url.searchParams.set('action', 'getIpDirectory');
  return fetch(url.toString())
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      yearData = data.years || {};
    });
}

function fuzzyMatch(name, q) {
  const n = name.replace(/\s/g, '').toLowerCase();
  const qn = q.replace(/\s/g, '').toLowerCase();
  return n.includes(qn);
}

function renderResults(q) {
  const area = document.getElementById('resultArea');
  if (!q) {
    area.innerHTML = '<div class="hint">이름을 입력하면 해당 교직원의 IP 정보가 표시됩니다.</div>';
    return;
  }
  if (!yearData) {
    area.innerHTML = '<div class="hint">데이터를 불러오는 중입니다...</div>';
    return;
  }

  // 연도 내림차순(최신 먼저)으로 정렬
  const years = Object.keys(yearData).sort((a, b) => b.localeCompare(a));

  const cards = [];
  for (const year of years) {
    const { entries, labels } = yearData[year];
    const matched = entries.filter(e => fuzzyMatch(e.name, q));
    if (!matched.length) continue;

    const rows = matched.map(e => `
      <div class="result-rows">
        <div class="info-row">
          <div class="info-label">${esc(labels.name || '이름')}</div>
          <div class="info-value name-val">${esc(e.name)}</div>
        </div>
        <div class="info-row">
          <div class="info-label">${esc(labels.role || '담당')}</div>
          <div class="info-value${e.role ? '' : ' empty'}">${e.role ? esc(e.role) : '—'}</div>
        </div>
        <div class="info-row">
          <div class="info-label">${esc(labels.account || '구글계정')}</div>
          <div class="info-value${e.account ? '' : ' empty'}">${e.account ? esc(e.account) : '—'}</div>
        </div>
        <div class="info-row">
          <div class="info-label">${esc(labels.ip || 'IP')}</div>
          <div class="info-value${e.ip ? '' : ' empty'}">${e.ip ? esc(e.ip) : '—'}</div>
        </div>
      </div>
    `).join('<hr style="margin:0;border:none;border-top:2px dashed var(--border)">');

    cards.push(`
      <div class="result-card">
        <div class="result-year">${esc(year)}년도</div>
        ${rows}
      </div>
    `);
  }

  if (!cards.length) {
    area.innerHTML = `<div class="empty-state">«${esc(q)}» 검색 결과가 없습니다.</div>`;
    return;
  }
  area.innerHTML = cards.join('');
}

let timer = null;
document.getElementById('searchBox').addEventListener('input', function() {
  clearTimeout(timer);
  const q = this.value.trim();
  timer = setTimeout(() => renderResults(q), 200);
});

// 데이터 미리 로드
loadData().catch(err => {
  document.getElementById('resultArea').innerHTML =
    `<div class="empty-state">데이터를 불러오지 못했습니다.<br><small>${esc(err.message)}</small></div>`;
});
</script>
