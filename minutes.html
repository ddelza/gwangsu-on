<script>
function callApi(action, params, opts) {
  params = params || {}; opts = opts || {};
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
      const mapper = opts.actionMap && opts.actionMap[action];
      if (mapper) { mapper(runner, params); }
      else { reject(new Error(`callApi: action "${action}"에 대한 actionMap 항목이 없습니다.`)); }
      return;
    }
    const url = new URL(opts.scriptUrl);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    fetch(url.toString()).then(r => r.json())
      .then(data => { if (data && data.error) reject(new Error(data.error)); else resolve(data); })
      .catch(reject);
  });
}
function detectInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
}
function openInExternalBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua)) window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  else if (/NAVER/i.test(ua)) window.location.href = 'naversearchapp://inappbrowser?app=naversearchapp&url=' + encodeURIComponent(url);
  else window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}
function showExternalBrowserBannerIfNeeded(bannerId) {
  if (detectInAppBrowser()) { const el = document.getElementById(bannerId); if (el) el.style.display = 'block'; }
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqEOYSrqY8FxiNc88lCml7Ym1w1imonHjgO4qqo0fzIB_8rdXs-PVoIMdBQA8t8L75wg/exec';
const ACTION_MAP = { getMinutes: (runner, p) => runner.getMinutes(p.limit ? parseInt(p.limit, 10) : 0) };

window.onload = function() {
  showExternalBrowserBannerIfNeeded('inappBanner');
  callApi('getMinutes', {}, { scriptUrl: APPS_SCRIPT_URL, actionMap: ACTION_MAP })
    .then(data => {
      const minutes = data.minutes || [];
      const wrap = document.getElementById('listWrap');
      if (!minutes.length) { wrap.innerHTML = '<div class="empty-state">등록된 회의록이 없습니다.</div>'; return; }
      wrap.innerHTML = minutes.map(m => `
        <div class="list-item">
          <div class="date">${esc(m.date)}</div>
          <div class="title">${esc(m.title)}</div>
          <div class="meta">작성자: ${esc(m.author)}</div>
          ${m.summary ? `<div class="summary">${esc(m.summary)}</div>` : ''}
          ${m.link ? `<a class="link-btn" href="${esc(m.link)}" target="_blank" rel="noopener">회의록 열기 →</a>` : ''}
        </div>
      `).join('');
    })
    .catch(err => {
      document.getElementById('listWrap').innerHTML =
        `<div class="empty-state">불러오기 실패: ${esc(err.message || String(err))}</div>`;
    });
};
</script>
