<script>
function detectInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
}
function openInExternalBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua)) window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  else if (/NAVER/i.test(ua)) window.location.href = 'naversearchapp://inappbrowser?app=naversearchapp&url=' + encodeURIComponent(url);
  else window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}
function showExternalBrowserBannerIfNeeded(bannerId) {
  if (detectInAppBrowser()) { const el = document.getElementById(bannerId); if (el) el.style.display = 'block'; }
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fuzzySearch(items, query, fields) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return items;
  const qNorm = q.replace(/\s/g, '');
  return items.filter(item => fields.some(f => {
    const v = String(item[f] || '').toLowerCase();
    return v.includes(q) || v.replace(/\s/g, '').includes(qNorm);
  }));
}

DIRECTORY.forEach(d => { d._searchText = [d.role, d.name, d.ext, d.direct].join(' '); });

let activeCat = '';

function renderChips() {
  const cats = [...new Set(DIRECTORY.map(d => d.cat))];
  const labels = { '관리자행정': '관리자/행정', '1학년': '1학년', '2학년': '2학년', '3학년': '3학년' };
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeCat === '' ? ' active' : '');
  allChip.textContent = '전체';
  allChip.onclick = () => { activeCat = ''; renderChips(); renderResults(); };
  wrap.appendChild(allChip);
  cats.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeCat === c ? ' active' : '');
    chip.textContent = labels[c] || c;
    chip.onclick = () => { activeCat = c; renderChips(); renderResults(); };
    wrap.appendChild(chip);
  });
}

function renderResults() {
  const q = document.getElementById('searchBox').value;
  let results = activeCat ? DIRECTORY.filter(d => d.cat === activeCat) : DIRECTORY;
  results = fuzzySearch(results, q, ['_searchText']);

  const wrap = document.getElementById('listWrap');
  if (!results.length) {
    wrap.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }

  let html = `<div class="result-count">${results.length}건</div>`;
  html += results.map(d => `
    <div class="phone-card cat-${d.cat}">
      <span class="role">${esc(d.role)}</span>
      <span class="name">${esc(d.name)}</span>
      <span class="nums">
        <div class="ext">☎ ${esc(d.ext)}</div>
        <div class="direct">${esc(d.direct)}</div>
      </span>
    </div>
  `).join('');
  wrap.innerHTML = html;
}

let debounceTimer = null;
document.getElementById('searchBox').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderResults, 150);
});

window.onload = function() {
  showExternalBrowserBannerIfNeeded('inappBanner');
  renderChips();
  renderResults();
};
