<style>
* { box-sizing: border-box; }

:root {
  --bg: #f5f5f7; --surface: #ffffff; --text: #1d1d1f; --text-muted: #6e6e73;
  --border: rgba(0,0,0,0.08); --nav-bg: #000000; --nav-text: rgba(255,255,255,0.85); --accent: #0066cc; --accent-soft: rgba(0,102,204,0.08);
}
:root[data-theme="teal"] { --bg:#f0f7f6; --surface:#ffffff; --text:#1d1d1f; --text-muted:#4a7a74; --border:rgba(0,0,0,0.08); --nav-bg:#00695c; --nav-text:rgba(255,255,255,0.9); --accent:#00695c; --accent-soft:rgba(0,105,92,0.08); }
:root[data-theme="coral"] { --bg:#fdf5f3; --surface:#ffffff; --text:#1d1d1f; --text-muted:#9a5a4a; --border:rgba(0,0,0,0.08); --nav-bg:#c0392b; --nav-text:rgba(255,255,255,0.9); --accent:#c0392b; --accent-soft:rgba(192,57,43,0.08); }
:root[data-theme="lavender"] { --bg:#f5f4fb; --surface:#ffffff; --text:#1d1d1f; --text-muted:#6a5a9a; --border:rgba(0,0,0,0.08); --nav-bg:#5b47b0; --nav-text:rgba(255,255,255,0.9); --accent:#5b47b0; --accent-soft:rgba(91,71,176,0.08); }
:root[data-theme="forest"] { --bg:#f2f7f2; --surface:#ffffff; --text:#1d1d1f; --text-muted:#4a7a5a; --border:rgba(0,0,0,0.08); --nav-bg:#2d6a3f; --nav-text:rgba(255,255,255,0.9); --accent:#2d6a3f; --accent-soft:rgba(45,106,63,0.08); }
:root[data-theme="slate"] { --bg:#f4f4f6; --surface:#ffffff; --text:#1d1d1f; --text-muted:#5a6070; --border:rgba(0,0,0,0.08); --nav-bg:#3a4252; --nav-text:rgba(255,255,255,0.9); --accent:#3a4252; --accent-soft:rgba(58,66,82,0.08); }
:root[data-theme="dark-navy"] { --bg:#1c2029; --surface:#232a38; --text:#e8eaed; --text-muted:#8a96aa; --border:rgba(255,255,255,0.08); --nav-bg:#0d1117; --nav-text:rgba(255,255,255,0.85); --accent:#4d9cff; --accent-soft:rgba(77,156,255,0.12); }
:root[data-theme="dark-forest"] { --bg:#1a2220; --surface:#222e2a; --text:#e4ece6; --text-muted:#7a9a84; --border:rgba(255,255,255,0.08); --nav-bg:#0f1a14; --nav-text:rgba(255,255,255,0.85); --accent:#4caf78; --accent-soft:rgba(76,175,120,0.12); }
:root[data-theme="dark-plum"] { --bg:#1e1a26; --surface:#26212e; --text:#ece8f0; --text-muted:#9a88b0; --border:rgba(255,255,255,0.08); --nav-bg:#130f1a; --nav-text:rgba(255,255,255,0.85); --accent:#b07ee0; --accent-soft:rgba(176,126,224,0.12); }

body {
  margin: 0;
  font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px; line-height: 1.47; letter-spacing: -0.374px;
  -webkit-font-smoothing: antialiased;
}
.topnav {
  display: flex; align-items: center; gap: 0;
  background: var(--nav-bg); padding: 0 22px; height: 44px;
  position: sticky; top: 0; z-index: 100;
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
}
.topnav .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--nav-text); font-weight: 600; font-size: 15px; letter-spacing: -0.3px; margin-right: 8px; white-space: nowrap; text-decoration: none; opacity: 1; }
.brand-logo { height: 22px; width: auto; display: block; }
.gen1-link { margin-left: auto; }
.topnav a { color: var(--nav-text); text-decoration: none; padding: 0 10px; font-size: 12px; font-weight: 400; letter-spacing: -0.12px; line-height: 44px; opacity: 0.85; white-space: nowrap; border-radius: 0; }
.topnav a:hover { opacity: 1; background: none; color: var(--nav-text); }
.topnav a.active { opacity: 1; background: none; color: var(--nav-text); font-weight: 600; }
#inappBanner {
  display: none; background: #fff3e0; border: 2px solid #ffb74d; border-radius: 12px;
  padding: 16px 20px; margin: 16px; text-align: center;
}
#inappBanner p { font-size: 0.9rem; color: #e65100; margin-bottom: 10px; line-height: 1.5; }
#inappBanner button {
  padding: 9px 18px; background: #e65100; color: white; border: none;
  border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600;
}
.filter-wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 8px; }
.search-box { width: 100%; padding: 14px 16px; font-size: 1.05rem; border: 1.5px solid var(--border); border-radius: 9999px; outline: none; margin-bottom: 12px; }
.search-box:focus { border-color: var(--accent); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.chip { padding: 6px 14px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 0.85rem; cursor: pointer; border: none; }
.chip.active { background: var(--accent); color: #fff; }
.howto-card {
  background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
  border: 1px solid var(--border); font-size: 0.82rem; color: #444; line-height: 1.7;
}
.howto-card b { color: var(--accent); }
.edit-mode-card { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.edit-mode-btn {
  padding: 8px 16px; border-radius: 999px; background: var(--accent); color: #fff;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
}
#editModeBar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.edit-mode-save-btn {
  padding: 7px 16px; border-radius: 999px; background: #1a7c4a; color: #fff;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
}
.edit-mode-add-btn {
  padding: 7px 16px; border-radius: 999px; background: #f0f2f6; color: var(--accent);
  font-size: 0.85rem; cursor: pointer; border: none;
}
.edit-mode-cancel-btn {
  padding: 7px 16px; border-radius: 999px; background: #f0f2f6; color: #555;
  font-size: 0.85rem; cursor: pointer; border: none;
}
.edit-status-msg { font-size: 0.82rem; color: #1a7c4a; }
.list-wrap { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; }
.result-count { font-size: 0.82rem; color: var(--text-muted); margin: 4px 2px 10px; }
.phone-card {
  display: flex; align-items: center; gap: 14px; background: var(--surface); border-radius: 12px;
  padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); border-left: 6px solid #ccc;
}
.phone-card .role { font-size: 0.75rem; color: var(--text-muted); min-width: 96px; }
.phone-card .name { font-size: 1rem; font-weight: 700; min-width: 76px; }
.phone-card .nums { margin-left: auto; text-align: right; }
.phone-card .ext { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.phone-card .direct { font-size: 0.78rem; color: var(--text-muted); }
.cat-관리자행정 { border-left-color: #6c93cf; }
.cat-1학년 { border-left-color: #d7c36a; }
.cat-2학년 { border-left-color: #7fb26b; }
.cat-3학년 { border-left-color: #c98aa8; }
.empty-state { text-align: center; color: var(--text-muted); padding: 40px 0; }
.footer-note { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; font-size: 0.82rem; color: var(--text-muted); text-align: center; }

/* 수정모드 */
.phone-edit-card {
  background: var(--surface); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
  border: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.phone-edit-card input, .phone-edit-card select {
  padding: 7px 9px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem;
}
.phone-edit-card .ed-cat { width: 110px; }
.phone-edit-card .ed-role { width: 130px; }
.phone-edit-card .ed-name { width: 80px; }
.phone-edit-card .ed-ext { width: 70px; }
.phone-edit-card .ed-direct { width: 120px; }
.ed-remove-btn {
  margin-left: auto; background: none; border: none; color: #c0392b; cursor: pointer; font-size: 0.9rem;
}
@media (max-width: 600px) {
  .topnav { padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .topnav::-webkit-scrollbar { display: none; }
  .phone-card { flex-wrap: wrap; }
  .phone-card .nums { margin-left: 0; text-align: left; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="brand"><img src="logo.png" alt="" class="brand-logo">광수 Online 교무실 2세대</a>
  <a href="calender.html">캘린더</a>
  <a href="stu.html">학생 정보 조회</a>
  <a href="phone.html" class="active">내선번호</a>
  <a href="tools.html">행정업무 간소화 도구</a>
  <a href="https://sites.google.com/kwangsu.ms.kr/work" target="_blank" rel="noopener" class="gen1-link">1세대 바로가기 ↗</a>
</nav>

<div id="inappBanner">
  <p>⚠️ 카카오톡 등 메신저 안에서 열면 데이터를 불러오지 못할 수 있어요.<br>아래 버튼으로 외부 브라우저(Chrome/Safari)에서 열어주세요.</p>
  <button onclick="openInExternalBrowser()">외부 브라우저로 열기</button>
</div>

<div class="filter-wrap">
  <input id="searchBox" class="search-box" type="text" placeholder="이름, 담당, 내선번호로 검색">
  <div id="chips" class="chips"></div>
  <div class="howto-card">
    📞 <b>돌려주기</b> ["돌려주기"+내선번호+#] &nbsp;&nbsp; 🔁 <b>착신</b> ["수신전환"+전화번호+"확인"] &nbsp;&nbsp; ⛔ <b>해지</b> ["수신전환"]
  </div>

  <div class="edit-mode-card">
    <button id="editModeToggleBtn" class="edit-mode-btn" onclick="enterEditMode()">✏️ 수정모드</button>
    <div id="editModeBar" style="display:none">
      <button class="edit-mode-add-btn" onclick="addEditRow()">➕ 행 추가</button>
      <button class="edit-mode-save-btn" onclick="savePhoneEdits()">✅ 수정 완료</button>
      <button class="edit-mode-cancel-btn" onclick="exitEditMode()">취소</button>
    </div>
    <span id="editStatusMsg" class="edit-status-msg"></span>
  </div>
</div>

<div class="list-wrap" id="listWrap">
  <div class="empty-state">불러오는 중...</div>
</div>

<div class="footer-note">
  📞 직통번호: 인터폰에 표시된 번호 그대로 사용 &nbsp;&nbsp; 📠 팩스번호: 031-768-3104
</div>

<script>
function callApi(action, params, opts) {
  params = params || {}; opts = opts || {};
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
      const mapper = opts.actionMap && opts.actionMap[action];
      if (mapper) { mapper(runner, params); }
      else { reject(new Error(`callApi: action "${action}"에 대한 actionMap 항목이 없습니다.`)); }
      return;
    }
    const url = new URL(opts.scriptUrl);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    fetch(url.toString()).then(r => r.json())
      .then(data => { if (data && data.error) reject(new Error(data.error)); else resolve(data); })
      .catch(reject);
  });
}
function detectInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
}
function openInExternalBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua)) window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  else if (/NAVER/i.test(ua)) window.location.href = 'naversearchapp://inappbrowser?app=naversearchapp&url=' + encodeURIComponent(url);
  else window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}
function showExternalBrowserBannerIfNeeded(bannerId) {
  if (detectInAppBrowser()) { const el = document.getElementById(bannerId); if (el) el.style.display = 'block'; }
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(str) { return esc(str).replace(/"/g, '&quot;'); }
function fuzzySearch(items, query, fields) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return items;
  const qNorm = q.replace(/\s/g, '');
  return items.filter(item => fields.some(f => {
    const v = String(item[f] || '').toLowerCase();
    return v.includes(q) || v.replace(/\s/g, '').includes(qNorm);
  }));
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqEOYSrqY8FxiNc88lCml7Ym1w1imonHjgO4qqo0fzIB_8rdXs-PVoIMdBQA8t8L75wg/exec';
const ACTION_MAP = { getPhoneDirectory: (runner) => runner.getPhoneDirectory() };
// 새로 추가되는 분류는 자유 텍스트라 미리 정해둔 예쁜 표시명이 없을 수 있다 — 기존 4개만 표시명을
// 따로 두고, 그 외(새로 추가한 분류)는 입력한 이름을 그대로 보여준다.
const CAT_LABEL_OVERRIDES = { '관리자행정': '관리자/행정' };
function catLabel(cat) { return CAT_LABEL_OVERRIDES[cat] || cat; }

let directory = [];
let categories = [];
let activeCat = '';
let editMode = false;

function loadDirectory() {
  return callApi('getPhoneDirectory', {}, { scriptUrl: APPS_SCRIPT_URL, actionMap: ACTION_MAP })
    .then(data => {
      directory = (data.entries || []).map(d => ({ ...d, _searchText: [d.role, d.name, d.ext, d.direct].join(' ') }));
      categories = data.categories || [];
      renderAll();
    });
}

async function addCategory() {
  const name = (prompt('추가할 분류 이름을 입력하세요 (예: 행정실, 4학년부)') || '').trim();
  if (!name) return;
  if (categories.includes(name)) { alert('이미 있는 분류입니다.'); return; }
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'addPhoneCategory', name }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    categories = data.categories || categories;
    renderAll();
  } catch (err) {
    alert('분류 추가 실패: ' + (err.message || String(err)));
  }
}

function renderAll() {
  renderChips();
  if (editMode) renderEditList(); else renderResults();
}

function allCategoryKeys() {
  const fromEntries = directory.map(d => d.cat).filter(Boolean);
  return [...new Set([...categories, ...fromEntries])];
}

function renderChips() {
  const cats = allCategoryKeys();
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeCat === '' ? ' active' : '');
  allChip.textContent = '전체';
  allChip.onclick = () => { activeCat = ''; renderAll(); };
  wrap.appendChild(allChip);
  cats.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeCat === c ? ' active' : '');
    chip.textContent = catLabel(c);
    chip.onclick = () => { activeCat = c; renderAll(); };
    wrap.appendChild(chip);
  });
  const addChip = document.createElement('button');
  addChip.className = 'chip';
  addChip.textContent = '+ 분류 추가';
  addChip.onclick = addCategory;
  wrap.appendChild(addChip);
}

function renderResults() {
  const q = document.getElementById('searchBox').value;
  let results = activeCat ? directory.filter(d => d.cat === activeCat) : directory;
  results = fuzzySearch(results, q, ['_searchText']);

  const wrap = document.getElementById('listWrap');
  if (!results.length) {
    wrap.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }

  let html = `<div class="result-count">${results.length}건</div>`;
  html += results.map(d => `
    <div class="phone-card cat-${esc(d.cat)}">
      <span class="role">${esc(d.role)}</span>
      <span class="name">${esc(d.name)}</span>
      <span class="nums">
        <div class="ext">☎ ${esc(d.ext)}</div>
        <div class="direct">${esc(d.direct)}</div>
      </span>
    </div>
  `).join('');
  wrap.innerHTML = html;
}

// ── 수정모드 ──────────────────────────────
function renderEditList() {
  const wrap = document.getElementById('listWrap');
  wrap.innerHTML = directory.map((d, i) => editRowHtml(d, i)).join('');
}

function editRowHtml(d, i) {
  const cats = allCategoryKeys();
  return `<div class="phone-edit-card" data-idx="${i}">
    <select class="ed-cat">
      ${cats.map(c => `<option value="${esc(c)}"${c === d.cat ? ' selected' : ''}>${esc(catLabel(c))}</option>`).join('')}
    </select>
    <input class="ed-role" value="${escAttr(d.role)}" placeholder="담당">
    <input class="ed-name" value="${escAttr(d.name)}" placeholder="이름">
    <input class="ed-ext" value="${escAttr(d.ext)}" placeholder="내선번호">
    <input class="ed-direct" value="${escAttr(d.direct)}" placeholder="직통번호">
    <button class="ed-remove-btn" onclick="removeEditRow(${i})">✕ 삭제</button>
  </div>`;
}

function addEditRow() {
  directory.push({ cat: allCategoryKeys()[0] || '', role: '', name: '', ext: '', direct: '' });
  renderEditList();
}

function removeEditRow(i) {
  directory.splice(i, 1);
  renderEditList();
}

function enterEditMode() {
  editMode = true;
  document.getElementById('editModeToggleBtn').style.display = 'none';
  document.getElementById('editModeBar').style.display = 'flex';
  document.getElementById('editStatusMsg').textContent = '';
  renderEditList();
}

function exitEditMode(skipReload) {
  editMode = false;
  document.getElementById('editModeToggleBtn').style.display = 'inline-block';
  document.getElementById('editModeBar').style.display = 'none';
  document.getElementById('editStatusMsg').textContent = '';
  if (!skipReload) loadDirectory(); else renderAll();
}

async function savePhoneEdits() {
  const entries = [...document.querySelectorAll('.phone-edit-card')].map(card => ({
    cat: card.querySelector('.ed-cat').value,
    role: card.querySelector('.ed-role').value.trim(),
    name: card.querySelector('.ed-name').value.trim(),
    ext: card.querySelector('.ed-ext').value.trim(),
    direct: card.querySelector('.ed-direct').value.trim(),
  }));

  const statusEl = document.getElementById('editStatusMsg');
  statusEl.textContent = '저장 중...';
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'savePhoneDirectory', entries }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    statusEl.textContent = `${data.count}건 저장되었습니다.`;
    exitEditMode(false);
  } catch (err) {
    statusEl.textContent = '저장 실패: ' + (err.message || String(err));
  }
}

let debounceTimer = null;
document.getElementById('searchBox').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderResults, 150);
});

window.onload = function() {
  showExternalBrowserBannerIfNeeded('inappBanner');
  loadDirectory().catch(err => {
    document.getElementById('listWrap').innerHTML =
      `<div class="empty-state">불러오기 실패: ${esc(err.message || String(err))}</div>`;
  });
};
</script>
