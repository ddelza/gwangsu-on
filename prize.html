<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상장 조회 — 광수 Online 교무실</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #f5f6f8; --surface: #ffffff; --text: #1a1a1a; --text-muted: #888888;
  --border: #d0d6e2; --nav-bg: #1a3d7c; --nav-text: #d8e3ff; --accent: #1a3d7c; --accent-soft: #e6ebf5;
}
:root[data-theme="teal"] { --bg:#f4f9f8; --surface:#ffffff; --text:#1a1a1a; --text-muted:#7a9c95; --border:#cfe6e0; --nav-bg:#146b5e; --nav-text:#cdeee7; --accent:#146b5e; --accent-soft:#e1f3ef; }
:root[data-theme="coral"] { --bg:#fbf6f3; --surface:#ffffff; --text:#1a1a1a; --text-muted:#a98a7c; --border:#ecd9d0; --nav-bg:#a85a3e; --nav-text:#f6ddd1; --accent:#a85a3e; --accent-soft:#f6e6df; }
:root[data-theme="lavender"] { --bg:#f7f5fb; --surface:#ffffff; --text:#1a1a1a; --text-muted:#8c81a6; --border:#e0daf0; --nav-bg:#5b4b8a; --nav-text:#e3ddf5; --accent:#5b4b8a; --accent-soft:#ece7f7; }
:root[data-theme="forest"] { --bg:#f5f8f5; --surface:#ffffff; --text:#1a1a1a; --text-muted:#7d9c8c; --border:#d6e8de; --nav-bg:#2d6a4f; --nav-text:#d2ece1; --accent:#2d6a4f; --accent-soft:#e3f1ea; }
:root[data-theme="slate"] { --bg:#f6f6f7; --surface:#ffffff; --text:#1a1a1a; --text-muted:#838c98; --border:#dde1e6; --nav-bg:#3d4a5c; --nav-text:#dbe2ea; --accent:#3d4a5c; --accent-soft:#e7eaee; }
:root[data-theme="dark-navy"] { --bg:#1b1f27; --surface:#242a35; --text:#e8e9ec; --text-muted:#9aa3b2; --border:#353d4a; --nav-bg:#141821; --nav-text:#b8c9ef; --accent:#7da3e8; --accent-soft:#2a3344; }
:root[data-theme="dark-forest"] { --bg:#1a211d; --surface:#232b26; --text:#e6ece8; --text-muted:#92a89c; --border:#34433a; --nav-bg:#141a17; --nav-text:#bcdfca; --accent:#5fae84; --accent-soft:#26352c; }
:root[data-theme="dark-plum"] { --bg:#201a24; --surface:#2a232f; --text:#ece6ef; --text-muted:#ab9fb4; --border:#3d3444; --nav-bg:#18131b; --nav-text:#d8c6e8; --accent:#a87fd0; --accent-soft:#322a3a; }

body {
  margin: 0;
  font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  background: var(--bg);
  color: var(--text);
}
.topnav {
  display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  background: var(--nav-bg); padding: 12px 16px;
}
.topnav .brand { color: #fff; font-weight: 700; font-size: 1.05rem; margin-right: 16px; white-space: nowrap; }
.topnav .brand { display: inline-flex; align-items: center; gap: 8px; }
.brand-logo { height: 28px; width: auto; display: block; }
.gen1-link { margin-left: auto; font-size: 0.8rem; opacity: 0.85; }
.topnav a { color: var(--nav-text); text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 0.92rem; }
.topnav a:hover, .topnav a.active { background: rgba(255,255,255,0.15); color: #fff; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

.upload-area {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  background: var(--surface);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.upload-area input[type=file] { display: none; }
.upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
.upload-label { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.upload-hint { font-size: 0.85rem; color: var(--text-muted); }
.upload-btn {
  display: inline-block; margin-top: 16px; padding: 10px 24px;
  background: var(--accent); color: #fff; border-radius: 8px;
  font-size: 0.92rem; font-weight: 600; cursor: pointer;
}

.class-badge {
  display: inline-block; background: var(--accent-soft); color: var(--accent);
  border-radius: 8px; padding: 4px 14px; font-weight: 700; font-size: 0.95rem;
  margin-bottom: 14px;
}
.result-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; }

.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  background: var(--surface); border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  font-size: 0.88rem;
}
thead th {
  background: var(--accent); color: #fff;
  padding: 10px 8px; text-align: center;
  font-size: 0.8rem; font-weight: 600; line-height: 1.3;
  white-space: nowrap;
}
tbody tr.student-row {
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr.student-row:hover { background: var(--accent-soft); }
tbody tr.student-row td {
  padding: 9px 8px; text-align: center; vertical-align: middle;
}
td.name-cell { text-align: left; font-weight: 600; padding-left: 12px; }
td.expand-icon { color: var(--text-muted); font-size: 0.75rem; width: 24px; }

.cnt-zero { color: #e53e3e; font-weight: 700; }
.cnt-pos  { color: #2f855a; font-weight: 700; }
.points-cell { font-weight: 700; color: var(--accent); }

tr.detail-row { display: none; }
tr.detail-row.open { display: table-row; }
tr.detail-row td {
  padding: 0 12px 14px 36px;
  background: var(--accent-soft);
  border-bottom: 2px solid var(--border);
}
.award-list { list-style: none; margin: 0; padding: 8px 0 0; }
.award-list li {
  padding: 7px 10px; margin-bottom: 6px;
  background: var(--surface); border-radius: 8px;
  border-left: 3px solid var(--accent);
  font-size: 0.84rem; line-height: 1.5;
}
.award-title { font-weight: 700; }
.award-meta { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
.award-sem-badge {
  display: inline-block; font-size: 0.72rem; font-weight: 700;
  background: var(--accent); color: #fff;
  border-radius: 4px; padding: 1px 6px; margin-right: 6px;
}

.no-award-note { color: var(--text-muted); font-size: 0.82rem; padding-top: 8px; }

@media print {
  .topnav, .upload-area { display: none; }
  .wrap { padding: 0; max-width: none; }
  table { font-size: 0.78rem; }
  tr.detail-row { display: none !important; }
  thead th { background: #1a3d7c !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cnt-zero { color: #e53e3e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cnt-pos  { color: #2f855a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="brand"><img src="logo.png" alt="" class="brand-logo">광수 Online 교무실 2세대</a>
  <a href="calender.html">캘린더</a>
  <a href="stu.html">학생 정보 조회</a>
  <a href="phone.html">내선번호</a>
  <a href="https://sites.google.com/kwangsu.ms.kr/work" target="_blank" rel="noopener" class="gen1-link">1세대 바로가기 ↗</a>
</nav>

<div class="wrap">
  <div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="upload-icon">📋</div>
    <div class="upload-label">NICE 상장 조회 엑셀 파일을 업로드하세요</div>
    <div class="upload-hint">학교생활기록부 상장 조회 양식 (.xlsx)</div>
    <label for="fileInput" class="upload-btn">파일 선택</label>
  </div>

  <div id="result" style="display:none;">
    <div id="classBadge" class="class-badge"></div>
    <div id="resultMeta" class="result-meta"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>학년</th>
            <th>반</th>
            <th>번호</th>
            <th>이름</th>
            <th>1학년<br>1학기</th>
            <th>1학년<br>2학기</th>
            <th>2학년<br>1학기</th>
            <th>2학년<br>2학기</th>
            <th>3학년<br>1학기</th>
            <th>3학년<br>2학기</th>
            <th>상점</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── NICE Excel 파서 ──────────────────────────────────────────────
function parseNice(workbook) {
  const ws = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

  let classGrade = null, classCls = null;

  // 열 인덱스 (0-based)
  let colAwardGrade = -1, colAwardSem = -1;
  let colNum = -1, colName = -1;
  let colAwardName = -1, colLevel = -1, colDate = -1, colHost = -1, colTarget = -1;

  // 1단계: 학급 헤더 + 열 헤더 탐지
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    if (!row) continue;

    // 학급 헤더 ("X학년 Y반")
    for (let j = 0; j < row.length; j++) {
      const v = String(row[j] == null ? '' : row[j]);
      const m = v.match(/(\d+)\s*학년\s*(\d+)\s*반/);
      if (m) { classGrade = parseInt(m[1]); classCls = parseInt(m[2]); }
    }

    // 열 헤더 행: "번호"와 "이름"과 "수상" 이 모두 있는 행
    const strs = row.map(v => String(v == null ? '' : v));
    const hasNum  = strs.some(s => s.includes('번호'));
    const hasName = strs.some(s => s.includes('이름') || s.includes('  '));
    const hasAward = strs.some(s => s.includes('수상') || s.includes('상장'));
    if (hasNum && hasName && hasAward) {
      for (let j = 0; j < strs.length; j++) {
        const s = strs[j];
        if (s.includes('학년') && colAwardGrade === -1) { colAwardGrade = j; colAwardSem = j + 1; }
        if (s.includes('번호') && colNum === -1) colNum = j;
        if ((s.includes('이름') || (s.trim() && s.includes('  '))) && colName === -1 && j > colNum) colName = j;
        if ((s.includes('수상명') || (s.includes('수상') && !s.includes('연월일') && !s.includes('기관'))) && colAwardName === -1) colAwardName = j;
        if ((s.includes('등급') || s.includes('위')) && !s.includes('학년') && colLevel === -1) colLevel = j;
        if ((s.includes('연월일') || s.includes('수상일')) && colDate === -1) colDate = j;
        if ((s.includes('기관') || s.includes('주최') || s.includes('수여')) && colHost === -1) colHost = j;
        if ((s.includes('참가대상') || s.includes('참가인원')) && colTarget === -1) colTarget = j;
      }
    }
  }

  // 열 인덱스 폴백 (파일 구조가 표준인 경우)
  if (colAwardGrade === -1) colAwardGrade = 1;
  if (colAwardSem === -1)   colAwardSem   = 2;
  if (colNum === -1)        colNum        = 3;
  if (colName === -1)       colName       = 4;
  if (colAwardName === -1)  colAwardName  = 5;
  if (colLevel === -1)      colLevel      = 11;
  if (colDate === -1)       colDate       = 13;
  if (colHost === -1)       colHost       = 14;
  if (colTarget === -1)     colTarget     = 18;

  // 2단계: 학생 데이터 파싱
  const students = {};
  const orderMap = {};
  let currentNum = null;
  let insertOrder = 0;
  // 학년/학기는 변경될 때만 값이 있고 나머지는 null인 희소 인코딩 → carry-forward
  let curAwardGrade = null, curAwardSem = null;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    if (!row) continue;

    // 열 헤더 행 스킵: colAwardGrade 위치가 문자열인 경우
    if (typeof row[colAwardGrade] === 'string') continue;
    // 페이지 마커 행 스킵: "숫자 / 숫자" 패턴
    if (typeof row[7] === 'number' && row[8] === '/') continue;
    if (typeof row[colNum + 4] === 'number' && row[colNum + 5] === '/') continue;

    const awardName = row[colAwardName];
    if (!awardName) continue;

    const numVal = row[colNum];
    if (numVal !== null && numVal !== undefined && typeof numVal === 'number') {
      currentNum = Math.round(numVal);
    }
    if (currentNum === null) continue;

    if (!students[currentNum]) {
      students[currentNum] = {
        grade: classGrade,
        cls: classCls,
        num: currentNum,
        name: row[colName] || '',
        awards: []
      };
      orderMap[currentNum] = insertOrder++;
    }

    // 이름이 늦게 나타날 수 있으므로 처음 나오면 저장
    if (!students[currentNum].name && row[colName]) {
      students[currentNum].name = row[colName];
    }

    // 학년/학기 carry-forward: 값이 있을 때만 갱신
    const ag = row[colAwardGrade];
    const as_ = row[colAwardSem];
    if (ag !== null && ag !== undefined && typeof ag === 'number') curAwardGrade = Math.round(ag);
    if (as_ !== null && as_ !== undefined && typeof as_ === 'number') curAwardSem = Math.round(as_);

    students[currentNum].awards.push({
      awardGrade: curAwardGrade,
      awardSem:   curAwardSem,
      name: String(awardName),
      level: row[colLevel] ? String(row[colLevel]) : '',
      date: row[colDate] ? String(row[colDate]) : '',
      host: row[colHost] ? String(row[colHost]) : '',
      target: row[colTarget] ? String(row[colTarget]) : ''
    });
  }

  return Object.values(students).sort((a, b) => a.num - b.num);
}

// ── 상점 계산 ──────────────────────────────────────────────────
function calcPoints(semCounts) {
  let pts = 0;
  for (const k of Object.keys(semCounts)) {
    if (semCounts[k] > 0) pts += 0.5;
  }
  return Math.min(pts, 2.0);
}

// ── 테이블 렌더 ────────────────────────────────────────────────
function render(students, classGrade, classCls) {
  document.getElementById('classBadge').textContent =
    (classGrade && classCls) ? `${classGrade}학년 ${classCls}반` : '학급 정보 없음';
  document.getElementById('resultMeta').textContent =
    `총 ${students.length}명 · 상 받은 학생 기준`;

  const SEMS = [
    ['1-1','1학년 1학기'], ['1-2','1학년 2학기'],
    ['2-1','2학년 1학기'], ['2-2','2학년 2학기'],
    ['3-1','3학년 1학기'], ['3-2','3학년 2학기']
  ];

  const rows = students.map((stu, idx) => {
    const semCounts = {'1-1':0,'1-2':0,'2-1':0,'2-2':0,'3-1':0,'3-2':0};
    for (const a of stu.awards) {
      const key = `${a.awardGrade}-${a.awardSem}`;
      if (semCounts[key] !== undefined) semCounts[key]++;
    }
    const pts = calcPoints(semCounts);

    const cntCells = SEMS.map(([k]) => {
      const n = semCounts[k];
      return `<td class="${n === 0 ? 'cnt-zero' : 'cnt-pos'}">${n}</td>`;
    }).join('');

    const detailId = `detail-${idx}`;
    const mainRow = `<tr class="student-row" onclick="toggleDetail('${detailId}', this)">
      <td class="expand-icon" id="icon-${detailId}">▶</td>
      <td>${esc(stu.grade ?? '')}</td>
      <td>${esc(stu.cls ?? '')}</td>
      <td>${esc(stu.num)}</td>
      <td class="name-cell">${esc(stu.name)}</td>
      ${cntCells}
      <td class="points-cell">${pts.toFixed(1)}</td>
    </tr>`;

    // 상세 행
    const awardItems = stu.awards.length ? stu.awards.map(a => {
      const semLabel = (a.awardGrade && a.awardSem) ? `${a.awardGrade}학년 ${a.awardSem}학기` : '';
      const meta = [a.level, a.date, a.host, a.target ? `대상: ${a.target}` : ''].filter(Boolean).join(' · ');
      return `<li>
        ${semLabel ? `<span class="award-sem-badge">${esc(semLabel)}</span>` : ''}
        <span class="award-title">${esc(a.name)}</span>
        ${meta ? `<div class="award-meta">${esc(meta)}</div>` : ''}
      </li>`;
    }).join('') : `<li class="no-award-note">상장 내역 없음</li>`;

    const detailRow = `<tr class="detail-row" id="${detailId}">
      <td colspan="12"><ul class="award-list">${awardItems}</ul></td>
    </tr>`;

    return mainRow + detailRow;
  }).join('');

  document.getElementById('tbody').innerHTML = rows;
  document.getElementById('result').style.display = '';
}

function toggleDetail(id, rowEl) {
  const detail = document.getElementById(id);
  const icon = document.getElementById(`icon-${id}`);
  const open = detail.classList.toggle('open');
  icon.textContent = open ? '▼' : '▶';
}

// ── 파일 읽기 ──────────────────────────────────────────────────
function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const students = parseNice(wb);
      if (!students.length) {
        alert('학생 데이터를 찾지 못했습니다. NICE 상장 조회 엑셀 파일인지 확인해주세요.');
        return;
      }
      const g = students[0].grade, c = students[0].cls;
      render(students, g, c);
      document.getElementById('uploadArea').style.display = 'none';
    } catch(err) {
      alert('파일 파싱 실패: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('fileInput').addEventListener('change', function() {
  if (this.files[0]) processFile(this.files[0]);
});

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
</script>
</body>
