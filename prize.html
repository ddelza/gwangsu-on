<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── NICE Excel 파서 (셀 직접 접근 방식) ─────────────────────────
// sheet_to_json 대신 encode_cell로 직접 접근 — !ref 기준 인덱스 오프셋 문제 회피
function getCv(ws, r, c) {
  const cell = ws[XLSX.utils.encode_cell({ r, c })];
  return (cell != null && cell.v != null) ? cell.v : null;
}

function parseNice(workbook) {
  const ws = workbook.Sheets[workbook.SheetNames[0]];
  if (!ws || !ws['!ref']) return [];
  const range = XLSX.utils.decode_range(ws['!ref']);
  const maxRow = range.e.r;
  const maxCol = range.e.c;

  // 기본 열 인덱스 (0-based 절대: A=0, B=1, C=2, D=3, E=4, F=5, L=11, N=13, O=14, S=18)
  // Python/openpyxl 분석 결과 기반
  let CG = 1, CS = 2, CN = 3, CE = 4; // grade, sem, num, name
  let CA = 5, CL = 11, CD = 13, CH = 14, CT = 18; // award, level, date, host, target

  let classGrade = null, classCls = null;

  // 1단계: 처음 30행에서 학급 헤더 탐지 + 열 헤더 확인
  for (let r = 0; r <= Math.min(29, maxRow); r++) {
    // 각 셀 값을 공백 제거 후 문자열로
    const rowVals = [];
    for (let c = 0; c <= maxCol; c++) {
      rowVals.push({ c, raw: getCv(ws, r, c), ns: String(getCv(ws, r, c) || '').replace(/\s+/g, '') });
    }

    // "X학년 Y반" 패턴 탐지
    for (const { raw } of rowVals) {
      const v = String(raw || '');
      const m = v.match(/(\d+)\s*학년\s*(\d+)\s*반/);
      if (m) { classGrade = parseInt(m[1]); classCls = parseInt(m[2]); }
    }

    // 열 헤더 행: 공백 제거 후 "번호"+"수상" 포함 여부
    const nss = rowVals.map(x => x.ns);
    if (nss.some(s => s.includes('번호')) && nss.some(s => s.includes('수상'))) {
      rowVals.forEach(({ c, ns: s }) => {
        if (s.includes('학년') && s.includes('학교') && CG === 1) { CG = c; CS = c + 1; }
        if (s.includes('번호') && CN === 3) CN = c;
        if (s.includes('이름') && CE === 4 && c > CN) CE = c;
        if (s.includes('수상명') && CA === 5) CA = c;
        if ((s.includes('등급') || (s.includes('위') && s.length < 6)) && CL === 11) CL = c;
        if (s.includes('연월일') && CD === 13) CD = c;
        if ((s.includes('참가대상') || s.includes('참가인원')) && CT === 18) CT = c;
        if ((s.includes('기관') || s.includes('주최')) && CH === 14) CH = c;
      });
    }
  }

  // 2단계: 학생 데이터 파싱
  const students = {};
  let currentNum = null;
  let curGrade = null, curSem = null;

  for (let r = 0; r <= maxRow; r++) {
    // 열 헤더 행 스킵: CG 위치가 문자열
    const gradeCell = getCv(ws, r, CG);
    if (typeof gradeCell === 'string') continue;

    // 페이지 마커 스킵: H열 숫자 + I열 '/'
    const h7 = getCv(ws, r, 7), h8 = getCv(ws, r, 8);
    if (typeof h7 === 'number' && h8 === '/') continue;

    const awardName = getCv(ws, r, CA);
    if (!awardName) continue;

    // 번호 carry: 새 학생이면 업데이트
    const numVal = getCv(ws, r, CN);
    if (typeof numVal === 'number') currentNum = Math.round(numVal);
    if (currentNum === null) continue;

    if (!students[currentNum]) {
      students[currentNum] = {
        grade: classGrade, cls: classCls, num: currentNum,
        name: String(getCv(ws, r, CE) || ''), awards: []
      };
    }
    const nameNow = getCv(ws, r, CE);
    if (!students[currentNum].name && nameNow) students[currentNum].name = String(nameNow);

    // 학년/학기 carry-forward
    if (typeof gradeCell === 'number') curGrade = Math.round(gradeCell);
    const semCell = getCv(ws, r, CS);
    if (typeof semCell === 'number') curSem = Math.round(semCell);

    students[currentNum].awards.push({
      awardGrade: curGrade, awardSem: curSem,
      name: String(awardName),
      level:  String(getCv(ws, r, CL) || ''),
      date:   String(getCv(ws, r, CD) || ''),
      host:   String(getCv(ws, r, CH) || ''),
      target: String(getCv(ws, r, CT) || '')
    });
  }

  return Object.values(students).sort((a, b) => a.num - b.num);
}

// ── 상점 계산 ──────────────────────────────────────────────────
function calcPoints(semCounts) {
  let pts = 0;
  for (const k of Object.keys(semCounts)) {
    if (semCounts[k] > 0) pts += 0.5;
  }
  return Math.min(pts, 2.0);
}

// ── 테이블 렌더 ────────────────────────────────────────────────
function render(students, classGrade, classCls) {
  document.getElementById('classBadge').textContent =
    (classGrade && classCls) ? `${classGrade}학년 ${classCls}반` : '학급 정보 없음';
  document.getElementById('resultMeta').textContent =
    `총 ${students.length}명 · 상 받은 학생 기준`;

  const SEMS = [
    ['1-1','1학년 1학기'], ['1-2','1학년 2학기'],
    ['2-1','2학년 1학기'], ['2-2','2학년 2학기'],
    ['3-1','3학년 1학기'], ['3-2','3학년 2학기']
  ];

  const rows = students.map((stu, idx) => {
    const semCounts = {'1-1':0,'1-2':0,'2-1':0,'2-2':0,'3-1':0,'3-2':0};
    for (const a of stu.awards) {
      const key = `${a.awardGrade}-${a.awardSem}`;
      if (semCounts[key] !== undefined) semCounts[key]++;
    }
    const pts = calcPoints(semCounts);

    const cntCells = SEMS.map(([k]) => {
      const n = semCounts[k];
      return `<td class="${n === 0 ? 'cnt-zero' : 'cnt-pos'}">${n}</td>`;
    }).join('');

    const detailId = `detail-${idx}`;
    const mainRow = `<tr class="student-row" onclick="toggleDetail('${detailId}', this)">
      <td class="expand-icon" id="icon-${detailId}">▶</td>
      <td>${esc(stu.grade ?? '')}</td>
      <td>${esc(stu.cls ?? '')}</td>
      <td>${esc(stu.num)}</td>
      <td class="name-cell">${esc(stu.name)}</td>
      ${cntCells}
      <td class="points-cell">${pts.toFixed(1)}</td>
    </tr>`;

    // 상세 행
    const awardItems = stu.awards.length ? stu.awards.map(a => {
      const semLabel = (a.awardGrade && a.awardSem) ? `${a.awardGrade}학년 ${a.awardSem}학기` : '';
      const meta = [a.level, a.date, a.host, a.target ? `대상: ${a.target}` : ''].filter(Boolean).join(' · ');
      return `<li>
        ${semLabel ? `<span class="award-sem-badge">${esc(semLabel)}</span>` : ''}
        <span class="award-title">${esc(a.name)}</span>
        ${meta ? `<div class="award-meta">${esc(meta)}</div>` : ''}
      </li>`;
    }).join('') : `<li class="no-award-note">상장 내역 없음</li>`;

    const detailRow = `<tr class="detail-row" id="${detailId}">
      <td colspan="12"><ul class="award-list">${awardItems}</ul></td>
    </tr>`;

    return mainRow + detailRow;
  }).join('');

  document.getElementById('tbody').innerHTML = rows;
  document.getElementById('result').style.display = '';
}

function toggleDetail(id, rowEl) {
  const detail = document.getElementById(id);
  const icon = document.getElementById(`icon-${id}`);
  const open = detail.classList.toggle('open');
  icon.textContent = open ? '▼' : '▶';
}

// ── 파일 읽기 ──────────────────────────────────────────────────
function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const students = parseNice(wb);
      if (!students.length) {
        alert('학생 데이터를 찾지 못했습니다. NICE 상장 조회 엑셀 파일인지 확인해주세요.');
        return;
      }
      const g = students[0].grade, c = students[0].cls;
      render(students, g, c);
      document.getElementById('uploadArea').style.display = 'none';
    } catch(err) {
      alert('파일 파싱 실패: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('fileInput').addEventListener('change', function() {
  if (this.files[0]) processFile(this.files[0]);
});

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
</script>
