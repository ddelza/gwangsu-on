<script>
// =============================================
// shared-client.js (gwangsu-shared-lib v1) — 인라인 포함
// =============================================
function callApi(action, params, opts) {
  params = params || {};
  opts = opts || {};
  return new Promise((resolve, reject) => {
    if (opts.jsonp) {
      const url = new URL(opts.scriptUrl);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      jsonp(url.toString()).then(resolve).catch(reject);
      return;
    }
    const url = new URL(opts.scriptUrl);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    fetch(url.toString())
      .then(r => r.json())
      .then(data => { if (data && data.error) reject(new Error(data.error)); else resolve(data); })
      .catch(reject);
  });
}
function jsonpOnce(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + Date.now() + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    const timeoutId = setTimeout(() => { delete window[cbName]; script.remove(); reject(new Error('서버 응답 시간이 초과되었습니다.')); }, 6000);
    window[cbName] = (data) => { clearTimeout(timeoutId); delete window[cbName]; script.remove(); if (data && data.error) reject(new Error(data.error)); else resolve(data); };
    script.onerror = () => { clearTimeout(timeoutId); delete window[cbName]; script.remove(); reject(new Error('서버에 연결할 수 없습니다.')); };
    document.head.appendChild(script);
  });
}
function jsonp(url) {
  return jsonpOnce(url).catch(() => new Promise((resolve, reject) => {
    setTimeout(() => { jsonpOnce(url).then(resolve).catch(reject); }, 1500);
  }));
}
function detectInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
}
function openInExternalBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua)) window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  else if (/NAVER/i.test(ua)) window.location.href = 'naversearchapp://inappbrowser?app=naversearchapp&url=' + encodeURIComponent(url);
  else window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}
function showExternalBrowserBannerIfNeeded(bannerId) {
  if (detectInAppBrowser()) { const el = document.getElementById(bannerId); if (el) el.style.display = 'block'; }
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =============================================
// 페이지 로직
// =============================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxm5dUC5HkUiHYjrkwuVWG1Quvan-_mUIY3SJhPwnvaCW30iw83CsFavm4LwthFfAz-mw/exec';
const WEEKDAY_LABELS = ['월', '화', '수', '목', '금'];

let cachedData = null; // { syncedAt, weeks: [{ r, label, startDate, timetable: { grade: { class: [ [day0...],... ] } } }] }
let currentMode = 'class'; // 'class' | 'teacher'

function loadTimetable() {
  return callApi('cached', {}, { scriptUrl: APPS_SCRIPT_URL, jsonp: true });
}

function currentWeek() {
  const weekSelect = document.getElementById('weekSelect');
  return cachedData.weeks.find(w => w.r === weekSelect.value) || cachedData.weeks[0];
}

// 현재 주차의 전체 학년/반을 훑어서 { grade, class, weekday, classTime, subject, teacher } 셀을 하나의 배열로 펼친다.
function flattenWeekCells(week) {
  const cells = [];
  Object.keys(week.timetable).forEach(grade => {
    Object.keys(week.timetable[grade]).forEach(cls => {
      const days = week.timetable[grade][cls];
      days.forEach((day, weekday) => {
        if (!day) return;
        day.forEach((cell, period) => {
          if (cell && cell.subject) cells.push(Object.assign({ weekday, period }, cell));
        });
      });
    });
  });
  return cells;
}

function listTeachers(week) {
  const names = new Set();
  flattenWeekCells(week).forEach(cell => { if (cell.teacher) names.add(cell.teacher); });
  return [...names].sort((a, b) => a.localeCompare(b, 'ko'));
}

function populateSelectors() {
  const weekSelect = document.getElementById('weekSelect');
  const gradeSelect = document.getElementById('gradeSelect');
  const classSelect = document.getElementById('classSelect');
  const teacherSelect = document.getElementById('teacherSelect');

  if (!cachedData.weeks || cachedData.weeks.length === 0) {
    document.getElementById('tableArea').innerHTML =
      '<div class="empty-state">아직 동기화된 시간표가 없습니다. 서버에서 comcigan_dailySync를 한 번 실행해주세요.</div>';
    return false;
  }

  const savedWeek = localStorage.getItem('tt_week');
  const savedGrade = localStorage.getItem('tt_grade');
  const savedClass = localStorage.getItem('tt_class');
  const savedTeacher = localStorage.getItem('tt_teacher');
  const weekRs = cachedData.weeks.map(w => w.r);

  weekSelect.innerHTML = cachedData.weeks.map(w => `<option value="${esc(w.r)}">${esc(w.label)}</option>`).join('');
  weekSelect.value = weekRs.includes(savedWeek) ? savedWeek : weekRs[0];

  function refreshGradeOptions() {
    const grades = Object.keys(currentWeek().timetable || {}).sort((a, b) => Number(a) - Number(b));
    gradeSelect.innerHTML = grades.map(g => `<option value="${g}">${g}학년</option>`).join('');
    gradeSelect.value = grades.includes(savedGrade) ? savedGrade : grades[0];
  }
  function refreshClassOptions() {
    const grade = gradeSelect.value;
    const classes = Object.keys(currentWeek().timetable[grade] || {}).sort((a, b) => Number(a) - Number(b));
    classSelect.innerHTML = classes.map(c => `<option value="${c}">${c}반</option>`).join('');
    classSelect.value = classes.includes(savedClass) ? savedClass : (classes[0] || '');
  }
  function refreshTeacherOptions() {
    const teachers = listTeachers(currentWeek());
    teacherSelect.innerHTML = teachers.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
    teacherSelect.value = teachers.includes(savedTeacher) ? savedTeacher : (teachers[0] || '');
  }
  refreshGradeOptions();
  refreshClassOptions();
  refreshTeacherOptions();

  weekSelect.onchange = () => { refreshGradeOptions(); refreshClassOptions(); refreshTeacherOptions(); renderTable(); saveSelection(); };
  gradeSelect.onchange = () => { refreshClassOptions(); renderTable(); saveSelection(); };
  classSelect.onchange = () => { renderTable(); saveSelection(); };
  teacherSelect.onchange = () => { renderTable(); saveSelection(); };

  function applyMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.tt-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    gradeSelect.style.display = mode === 'class' ? '' : 'none';
    classSelect.style.display = mode === 'class' ? '' : 'none';
    teacherSelect.style.display = mode === 'teacher' ? '' : 'none';
  }

  document.querySelectorAll('.tt-mode-btn').forEach(btn => {
    btn.onclick = () => { applyMode(btn.dataset.mode); renderTable(); saveSelection(); };
  });

  const savedMode = localStorage.getItem('tt_mode');
  applyMode(savedMode === 'teacher' ? 'teacher' : 'class');
  return true;
}

function saveSelection() {
  localStorage.setItem('tt_mode', currentMode);
  localStorage.setItem('tt_week', document.getElementById('weekSelect').value);
  localStorage.setItem('tt_grade', document.getElementById('gradeSelect').value);
  localStorage.setItem('tt_class', document.getElementById('classSelect').value);
  localStorage.setItem('tt_teacher', document.getElementById('teacherSelect').value);
}

function weekdayHeaderHtml(week) {
  const todayStr = new Date().toDateString();
  const startDate = week.startDate ? new Date(week.startDate) : null;
  let html = '<thead><tr><th class="tt-corner"></th>';
  WEEKDAY_LABELS.forEach((label, idx) => {
    let dateLabel = label;
    let isToday = false;
    if (startDate) {
      const d = new Date(startDate);
      d.setDate(d.getDate() + idx);
      dateLabel = `${label}(${d.getDate()})`;
      isToday = d.toDateString() === todayStr;
    }
    html += `<th class="${isToday ? 'tt-today' : ''}">${dateLabel}</th>`;
  });
  html += '</tr></thead>';
  return html;
}

function isTodayColumn(week, weekdayIdx) {
  if (!week.startDate) return false;
  const dd = new Date(week.startDate);
  dd.setDate(dd.getDate() + weekdayIdx);
  return dd.toDateString() === new Date().toDateString();
}

function renderClassTable(week) {
  const grade = document.getElementById('gradeSelect').value;
  const cls = document.getElementById('classSelect').value;
  const days = (week.timetable[grade] || {})[cls];
  const tableArea = document.getElementById('tableArea');

  if (!days) {
    tableArea.innerHTML = '<div class="empty-state">해당 학년/반 데이터가 없습니다.</div>';
    return;
  }

  // 요일별 최대 교시 수 계산 (학년/반마다 다를 수 있어서 고정하지 않음)
  let maxPeriods = 0;
  days.forEach(day => { if (day) maxPeriods = Math.max(maxPeriods, day.length); });

  let html = '<table class="tt-table">' + weekdayHeaderHtml(week) + '<tbody>';
  for (let period = 0; period < maxPeriods; period++) {
    html += `<tr><th>${period + 1}</th>`;
    for (let d = 0; d < 5; d++) {
      const cell = days[d] && days[d][period];
      const isToday = isTodayColumn(week, d);
      if (cell && cell.subject) {
        html += `<td class="tt-cell${isToday ? ' tt-today-col' : ''}">
          <div class="tt-subject">${esc(cell.subject)}</div>
          <div class="tt-teacher">${esc(cell.teacher)}</div>
        </td>`;
      } else {
        html += `<td class="tt-cell tt-empty-cell${isToday ? ' tt-today-col' : ''}">-</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  tableArea.innerHTML = html;
}

function renderTeacherTable(week) {
  const teacher = document.getElementById('teacherSelect').value;
  const tableArea = document.getElementById('tableArea');
  const cells = flattenWeekCells(week);

  if (!teacher) {
    tableArea.innerHTML = '<div class="empty-state">해당 주차에 교사 정보가 없습니다.</div>';
    return;
  }

  // 학년/반마다 교시 수가 달라도 빠짐없이 보이도록, 이번 주 전체에서 가장 큰 교시 수를 기준으로 삼는다.
  let maxPeriods = 0;
  cells.forEach(cell => { maxPeriods = Math.max(maxPeriods, cell.period + 1); });

  const grid = {}; // "weekday_period" -> cell
  cells.filter(cell => cell.teacher === teacher).forEach(cell => {
    grid[cell.weekday + '_' + cell.period] = cell;
  });

  let html = '<table class="tt-table">' + weekdayHeaderHtml(week) + '<tbody>';
  for (let period = 0; period < maxPeriods; period++) {
    html += `<tr><th>${period + 1}</th>`;
    for (let d = 0; d < 5; d++) {
      const cell = grid[d + '_' + period];
      const isToday = isTodayColumn(week, d);
      if (cell) {
        html += `<td class="tt-cell${isToday ? ' tt-today-col' : ''}">
          <div class="tt-subject">${esc(cell.subject)}</div>
          <div class="tt-teacher">${esc(cell.grade)}학년 ${esc(cell.class)}반</div>
        </td>`;
      } else {
        html += `<td class="tt-cell tt-empty-cell${isToday ? ' tt-today-col' : ''}">-</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  tableArea.innerHTML = html;
}

function renderTable() {
  const week = currentWeek();
  if (currentMode === 'teacher') renderTeacherTable(week);
  else renderClassTable(week);
}

window.onload = function() {
  showExternalBrowserBannerIfNeeded('inappBanner');
  loadTimetable().then(data => {
    cachedData = data;
    const syncedLabel = document.getElementById('syncedLabel');
    syncedLabel.textContent = data.syncedAt
      ? '컴시간 알리미 마지막 동기화: ' + new Date(data.syncedAt).toLocaleString('ko-KR')
      : '동기화 기록 없음';
    if (populateSelectors()) renderTable();
  }).catch(err => {
    document.getElementById('tableArea').innerHTML =
      `<div class="error-state">불러오기 실패: ${esc(err.message || String(err))}</div>`;
  });
};
</script>
