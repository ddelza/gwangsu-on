.topnav .brand { display: inline-flex; align-items: center; gap: 8px; }
.brand-logo { height: 28px; width: auto; display: block; }
.gen1-link { margin-left: auto; font-size: 0.8rem; opacity: 0.85; }
.topnav a { color: var(--nav-text); text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 0.92rem; }
.topnav a:hover, .topnav a.active { background: rgba(255,255,255,0.15); color: #fff; }

.page-header {
  max-width: 960px; margin: 0 auto; padding: 24px 16px 4px;
}
.page-header h1 {
  font-size: 1.25rem; font-weight: 700; margin: 0 0 4px;

}
.page-header p { font-size: 0.88rem; color: var(--text-muted); margin: 0; }

.search-wrap { padding: 14px 16px 8px; max-width: 960px; margin: 0 auto; }
.search-box {
  width: 100%; padding: 13px 16px; font-size: 1rem;
  border: 2px solid var(--border); border-radius: 12px; outline: none;
  background: var(--surface); color: var(--text);
}
.search-box:focus { border-color: var(--accent); }

.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;
  max-width: 960px; margin: 0 auto; padding: 8px 16px 40px;
}
.card {
  display: block; background: var(--surface); border-radius: 14px; padding: 18px 16px;
  text-decoration: none; color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: box-shadow 0.15s, transform 0.15s;
  position: relative;
}
.card:hover { box-shadow: 0 5px 16px rgba(0,0,0,0.13); transform: translateY(-2px); }
.card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.card-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; object-fit: contain; }
.card-badge {
  font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 999px;
  background: var(--accent-soft); color: var(--accent);
}
.card .title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.card .desc { font-size: 0.84rem; color: var(--text-muted); line-height: 1.45; }
.card .arrow {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; color: var(--border);
}
.empty-state { text-align: center; color: var(--text-muted); padding: 60px 0; grid-column: 1/-1; }

<div class="page-header">
  <h1>행정업무 간소화 도구</h1>
  <p>자주 쓰는 행정 계산·조회 도구 모음입니다.</p>
</div>

<div class="search-wrap">
  <input id="searchBox" class="search-box" type="text" placeholder="도구 이름이나 기능을 검색하세요">
</div>

<div id="cardGrid" class="card-grid">
  <div class="empty-state">불러오는 중…</div>
</div>

<script>
// ─── 하드코딩된 도구 목록 (색인 시트와 별개로 유지) ────────────
// 새 도구 추가 시 이 배열에 항목을 추가하세요.
const TOOLS = [
  {
    title: '랜덤 지목',
    desc: '학생 명단 등록(직접 입력/학년·반 자동불러오기) → 슬롯머신 애니메이션으로 랜덤 지목 → 지목된 학생 누적 표시',
    url: 'random.html',
    keywords: '랜덤 지목 뽑기 슬롯 순서 학생 호출'
  },
  {
    title: '모둠 짜기',
    desc: '학생 명단 입력(직접/엑셀/학년·반 자동불러오기) → 모둠 수·인원 수·성별 옵션 설정 → 랜덤 모둠 배치 및 출력',
    url: 'group.html',
    keywords: '모둠 그룹 짜기 배치 랜덤 성별 균형 학급'
  },
  {
    title: '학생 자리 배치 프로그램',
    desc: '학생 명단 입력(엑셀/직접) → 책상 배치 격자 설정 → 랜덤 자리 배치 및 출력',
    url: 'seat.html',
    keywords: '자리 배치 좌석 랜덤 책상 학급 명단'
  },
  {
    title: '중학생 상점 계산기 (2026ver)',
    desc: 'NEIS 상장 조회 엑셀 업로드 → 학급별 학기별 수상 내역 및 상점(최대 2점) 자동 집계',
    url: 'prize.html',
    keywords: '상점 상장 수상 NEIS 나이스 학생부 생활기록부'
  },
  {
    title: '고입 합격 점수 조회 시스템 (광수중 2026ver)',
    desc: '광수중 졸업생 고입 합격 점수 조회 및 분석',
    url: 'https://script.google.com/a/macros/gwangsu.ms.kr/s/AKfycbzmM1X3Oh9VfpHOFjpy-GM2fXaaC0YybAME9S8frNc1qepDDBhhDdghTM-zQtsCseyC/exec',
    keywords: '고입 합격 점수 입시 고등학교 진학'
  },
  {
    title: '내신성적 조회·분석 시스템 (2026ver)',
    desc: '학생 내신 성적 조회 및 분석 도구',
    url: 'https://ddelza.github.io/naesin/',
    keywords: '내신 성적 조회 분석 석차 등급'
  }
];

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function iconFor(url) {
  const u = String(url || '');
  if (u.includes('docs.google.com/presentation'))
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#f9ab00"/><rect x="5" y="6" width="14" height="9" rx="1" fill="#fff"/><rect x="9" y="17" width="6" height="2" rx="1" fill="#fff"/></svg>';
  if (u.includes('docs.google.com/spreadsheets'))
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#0f9d58"/><rect x="5" y="5" width="14" height="14" rx="1" fill="#fff"/><rect x="5" y="9.3" width="14" height="1.4" fill="#0f9d58"/><rect x="5" y="13.3" width="14" height="1.4" fill="#0f9d58"/><rect x="10.3" y="5" width="1.4" height="14" fill="#0f9d58"/></svg>';
  return '<img class="card-icon" src="logo.png" alt="">';
}

function fuzzyMatch(item, q) {
  if (!q) return true;
  const qn = q.toLowerCase().replace(/\s+/g,'');
  const text = (item.title + ' ' + item.desc + ' ' + (item.keywords||'')).toLowerCase();
  return text.includes(q.toLowerCase()) || text.replace(/\s+/g,'').includes(qn);
}

function render(q) {
  const filtered = TOOLS.filter(t => fuzzyMatch(t, q));
  const grid = document.getElementById('cardGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }
  grid.innerHTML = filtered.map(t => `
    <a class="card" href="${esc(t.url)}">
      <div class="card-head">${iconFor(t.url)}<span class="card-badge">도구</span></div>
      <div class="title">${esc(t.title)}</div>
      <div class="desc">${esc(t.desc)}</div>
      <span class="arrow">›</span>
    </a>
  `).join('');
}

let timer = null;
document.getElementById('searchBox').addEventListener('input', function() {
  clearTimeout(timer);
  timer = setTimeout(() => render(this.value.trim()), 150);
});

render('');
</script>
