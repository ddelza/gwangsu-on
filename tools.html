.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;

.card {
  display: block; background: var(--surface); border-radius: 14px; padding: 18px 16px;

  position: relative;

.card .title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.card .desc { font-size: 0.84rem; color: var(--text-muted); line-height: 1.45; }
.card .arrow {

}
.empty-state { text-align: center; color: var(--text-muted); padding: 60px 0; grid-column: 1/-1; }

  display: flex; align-items: center; justify-content: center;

.card-thumb svg { width: 100%; height: 100%; }

@media (max-width: 600px) {

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function iconFor(url) {
  const u = String(url || '');
  if (u.includes('docs.google.com/presentation'))
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#f9ab00"/><rect x="5" y="6" width="14" height="9" rx="1" fill="#fff"/><rect x="9" y="17" width="6" height="2" rx="1" fill="#fff"/></svg>';
  if (u.includes('docs.google.com/spreadsheets'))
    return '<svg class="card-icon" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#0f9d58"/><rect x="5" y="5" width="14" height="14" rx="1" fill="#fff"/><rect x="5" y="9.3" width="14" height="1.4" fill="#0f9d58"/><rect x="5" y="13.3" width="14" height="1.4" fill="#0f9d58"/><rect x="10.3" y="5" width="1.4" height="14" fill="#0f9d58"/></svg>';
  return '<img class="card-icon" src="logo.png" alt="">';
}

function fuzzyMatch(item, q) {
  if (!q) return true;
  const qn = q.toLowerCase().replace(/\s+/g,'');
  const text = (item.title + ' ' + item.desc + ' ' + (item.keywords||'')).toLowerCase();
  return text.includes(q.toLowerCase()) || text.replace(/\s+/g,'').includes(qn);
}

function render(q) {
  const filtered = TOOLS.filter(t => fuzzyMatch(t, q));
  const grid = document.getElementById('cardGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }
  grid.innerHTML = filtered.map(t => `
    <a class="card" href="${esc(t.url)}">
      ${t.thumb ? `<div class="card-thumb">${t.thumb}</div>` : ''}
      <div class="card-head">${iconFor(t.url)}<span class="card-badge">도구</span></div>
      <div class="title">${esc(t.title)}</div>
      <div class="desc">${esc(t.desc)}</div>
      <span class="arrow">›</span>
    </a>
  `).join('');
}

let timer = null;
document.getElementById('searchBox').addEventListener('input', function() {
  clearTimeout(timer);
  timer = setTimeout(() => render(this.value.trim()), 150);
});

render('');
</script>
