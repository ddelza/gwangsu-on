const TOTAL = CATEGORIES.reduce((sum, c) => sum + c.sentences.length, 0);
const STORAGE_KEY = 'truman_lets_grit_used_v1';

function loadUsed() {
  try {
    return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  } catch (e) { return new Set(); }
}
function saveUsed(used) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...used])); } catch (e) {}
}

function updateProgress() {
  const used = loadUsed();
  document.getElementById('usedCount').textContent = used.size;
  document.getElementById('totalCount').textContent = TOTAL;
  document.getElementById('progressFill').style.width = (used.size / TOTAL * 100) + '%';
}

function draw() {
  const used = loadUsed();
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.className = 'msg';

  const availableCatIdx = CATEGORIES
    .map((c, i) => i)
    .filter(i => CATEGORIES[i].sentences.some((_, j) => !used.has(i + '-' + j)));

  if (availableCatIdx.length < 2) {
    msg.textContent = '더 이상 뽑을 수 있는 조합이 없습니다. 전체 초기화를 눌러주세요.';
    document.getElementById('btnDraw').disabled = true;
    return;
  }

  const shuffled = availableCatIdx.slice().sort(() => Math.random() - 0.5);
  const [catA, catB] = shuffled.slice(0, 2);

  function pickFrom(catIdx) {
    const unusedIdx = CATEGORIES[catIdx].sentences
      .map((_, j) => j)
      .filter(j => !used.has(catIdx + '-' + j));
    const sentIdx = unusedIdx[Math.floor(Math.random() * unusedIdx.length)];
    used.add(catIdx + '-' + sentIdx);
    return { date: CATEGORIES[catIdx].date, text: CATEGORIES[catIdx].sentences[sentIdx] };
  }

  const picks = [pickFrom(catA), pickFrom(catB)].sort((a, b) => a.date < b.date ? -1 : 1);
  saveUsed(used);

  document.getElementById('resultBox').value = picks.map(p => p.text).join('\n');
  document.getElementById('btnCopy').disabled = false;
  updateProgress();
}

function copyResult() {
  const text = document.getElementById('resultBox').value;
  const msg = document.getElementById('msg');
  if (!text) return;

  function showCopied() {
    msg.textContent = '복사되었습니다!';
    msg.className = 'msg ok';
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }

  function fallbackCopy() {
    const box = document.getElementById('resultBox');
    box.focus();
    box.select();
    try {
      document.execCommand('copy');
      showCopied();
    } catch (e) {
      msg.textContent = '복사에 실패했습니다. 직접 선택해 복사해주세요.';
      msg.className = 'msg';
    }
  }
}

function resetAll() {
  if (!confirm('지금까지 뽑은 기록을 모두 초기화할까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('resultBox').value = '';
  document.getElementById('btnCopy').disabled = true;
  document.getElementById('btnDraw').disabled = false;
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'msg';
  updateProgress();
}

updateProgress();
